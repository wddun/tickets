<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | WTS Tickets</title>
    <meta name="theme-color" content="#1a1f3c">
    <link rel="stylesheet" href="style.css">
    <style>
        body { justify-content: flex-start; background: #f4f5f8; }
        .page-nav {
            background: #1a1f3c;
            padding: 0 20px; height: 52px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .page-nav img { height: 24px; width: auto; }
        .page-nav a { font-size: 13px; color: rgba(255,255,255,.6); font-weight: 500; }
        .page-nav a:hover { color: #fff; }

        .auth-wrap {
            flex: 1; display: flex;
            align-items: flex-start; justify-content: center;
            padding: 32px 16px 40px;
        }
        .auth-card {
            background: #fff;
            border: 1px solid #dde3ed;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,.07);
            padding: 32px 28px;
            width: 100%; max-width: 400px;
        }
        @media (max-width: 480px) {
            .auth-card { padding: 24px 18px; }
            .auth-wrap  { padding: 20px 12px 32px; }
        }

        .auth-logo { text-align: center; margin-bottom: 24px; }
        .auth-logo img { height: 32px; margin: 0 auto; }
        .auth-title { font-size: 20px; font-weight: 800; color: #1a1f3c; text-align: center; margin-bottom: 4px; }
        .auth-desc  { font-size: 14px; color: #64748b; text-align: center; margin-bottom: 24px; }

        .toggle-row {
            text-align: center; margin-top: 18px;
            font-size: 14px; color: #64748b;
        }
        .toggle-row a { color: #c4294a; font-weight: 600; text-decoration: none; }
        .toggle-row a:hover { text-decoration: underline; }

        .footer-note {
            margin-top: 20px;
            font-size: 11px; color: #94a3b8; text-align: center;
        }
        .footer-note a { color: #94a3b8; }
        .footer-note a:hover { color: #64748b; }
    </style>
</head>
<body>
    <nav class="page-nav">
        <a href="/"><img src="/logo-nav.svg" alt="Will's Tech Support"></a>
        <a href="/">← Back</a>
    </nav>
    <div class="auth-wrap">
        <div class="auth-card">
            <div class="auth-logo"><img src="/logo-nav-dark.svg" alt="Will's Tech Support"></div>
            <div class="auth-title" id="authTitle">Organizer Login</div>
            <div class="auth-desc"  id="authDesc">Manage your events and tickets.</div>

            <!-- Auth form -->
            <form id="authForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="organizer@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" id="submitBtn">Login</button>
            </form>

            <!-- Check-your-email state (after signup or blocked login) -->
            <div id="verifyState" style="display:none; text-align:center; padding: 8px 0 4px;">
                <div style="font-size:40px; margin-bottom:14px;">📬</div>
                <div style="font-size:17px; font-weight:700; color:#1a1f3c; margin-bottom:8px;" id="verifyTitle">Check your email</div>
                <div style="font-size:14px; color:#64748b; line-height:1.6; margin-bottom:22px;" id="verifyDesc">
                    We sent a verification link to <strong id="verifyEmail"></strong>. Click it to activate your account.
                </div>
                <button id="resendBtn" onclick="resendVerification()" style="background:#f1f5f9;border:none;color:#1a1f3c;font-size:14px;font-weight:600;padding:10px 22px;border-radius:10px;cursor:pointer;width:100%;margin-bottom:10px;">
                    Resend verification email
                </button>
                <button onclick="showAuthForm()" style="background:none;border:none;color:#94a3b8;font-size:13px;font-weight:500;cursor:pointer;padding:4px;">
                    ← Back to login
                </button>
            </div>

            <!-- Two-factor code state (after password succeeds on a 2FA-enabled account) -->
            <div id="totpState" style="display:none;">
                <div style="font-size:14px; color:#64748b; text-align:center; margin-bottom:20px;" id="totpPrompt">
                    Enter the 6-digit code from your authenticator app.
                </div>
                <div class="form-group">
                    <label for="totpCode" id="totpCodeLabel">Authentication Code</label>
                    <input type="text" id="totpCode" maxlength="6" inputmode="numeric" autocomplete="one-time-code" placeholder="123456"
                        onkeydown="if(event.key==='Enter'){event.preventDefault();submitTotp();}"
                        style="letter-spacing:3px; text-align:center; font-size:18px;">
                </div>
                <label style="display:flex; align-items:center; gap:8px; font-size:13px; color:#64748b; margin-bottom:18px; cursor:pointer;">
                    <input type="checkbox" id="totpRemember" style="width:auto;">
                    Remember this device for 30 days
                </label>
                <button type="button" id="totpSubmitBtn" onclick="submitTotp()" style="width:100%;">Verify</button>
                <button type="button" id="totpModeToggle" onclick="toggleTotpMode()" style="background:none;border:none;color:#94a3b8;font-size:13px;font-weight:500;cursor:pointer;padding:12px 4px 0;width:100%;">
                    Use a backup code instead
                </button>
                <button type="button" onclick="showAuthForm()" style="background:none;border:none;color:#94a3b8;font-size:13px;font-weight:500;cursor:pointer;padding:4px;width:100%;">
                    ← Back to login
                </button>
            </div>

            <div class="toggle-row" id="forgotRow">
                <a href="/forgot-password.html" style="color:#94a3b8;font-weight:500;">Forgot password?</a>
            </div>
            <div class="toggle-row" id="toggleRow">
                <span id="toggleText">Don't have an account?</span>
                <a href="#" id="toggleBtn">Sign Up</a>
            </div>
            <div class="footer-note">
                © Will's Tech Support &nbsp;·&nbsp;
                <a href="mailto:support@willstechsupport.com">support@willstechsupport.com</a>
            </div>
        </div>
    </div>

    <script>
        let isLogin = true;
        let pendingVerifyEmail = '';
        const toggleBtn  = document.getElementById('toggleBtn');
        const toggleText = document.getElementById('toggleText');
        const submitBtn  = document.getElementById('submitBtn');
        const authTitle  = document.getElementById('authTitle');
        const authDesc   = document.getElementById('authDesc');

        toggleBtn.onclick = e => {
            e.preventDefault();
            isLogin = !isLogin;
            authTitle.textContent  = isLogin ? 'Organizer Login' : 'Create Account';
            authDesc.textContent   = isLogin ? 'Manage your events and tickets.' : 'Start hosting your own events today.';
            toggleText.textContent = isLogin ? "Don't have an account?" : 'Already have an account?';
            toggleBtn.textContent  = isLogin ? 'Sign Up' : 'Login';
            submitBtn.textContent  = isLogin ? 'Login' : 'Create Account';
            document.querySelector('input[autocomplete="current-password"]').autocomplete = isLogin ? 'current-password' : 'new-password';
            document.getElementById('forgotRow').style.display = isLogin ? '' : 'none';
        };

        document.getElementById('authForm').onsubmit = async e => {
            e.preventDefault();
            const email    = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const endpoint = isLogin ? '/api/auth/login' : '/api/auth/signup';
            submitBtn.disabled = true;
            submitBtn.textContent = isLogin ? 'Logging in…' : 'Creating account…';
            try {
                const r    = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
                const data = await r.json();
                if (data.success && data.needsVerification) {
                    // Signup — show check-your-email screen
                    showVerifyState(data.email || email, 'Check your email', `We sent a verification link to`);
                } else if (data.needsVerification) {
                    // Login blocked — unverified account
                    showVerifyState(data.email || email, 'Email not verified', `Your account isn't activated yet. We sent a link to`);
                } else if (data.needsTotp) {
                    // Password was correct — this account has 2FA enabled and
                    // this device isn't remembered, so finish with a code.
                    showTotpState(data.pendingToken);
                } else if (data.success) {
                    const next = new URLSearchParams(window.location.search).get('next');
                    window.location.href = (next && next.startsWith('/')) ? next : '/dashboard.html';
                } else {
                    alert('Error: ' + data.error);
                }
            } catch { alert('Connection error'); }
            finally {
                submitBtn.disabled = false;
                submitBtn.textContent = isLogin ? 'Login' : 'Create Account';
            }
        };

        function showVerifyState(email, title, desc) {
            pendingVerifyEmail = email;
            document.getElementById('authForm').style.display    = 'none';
            document.getElementById('forgotRow').style.display   = 'none';
            document.getElementById('toggleRow').style.display   = 'none';
            document.getElementById('verifyState').style.display = 'block';
            document.getElementById('verifyTitle').textContent   = title;
            document.getElementById('verifyDesc').innerHTML      = desc + ' <strong>' + email + '</strong>. Click it to activate your account.';
            authTitle.textContent = title;
            authDesc.textContent  = '';
        }

        function showAuthForm() {
            document.getElementById('authForm').style.display    = 'block';
            document.getElementById('forgotRow').style.display   = '';
            document.getElementById('toggleRow').style.display   = '';
            document.getElementById('verifyState').style.display = 'none';
            document.getElementById('totpState').style.display   = 'none';
            authTitle.textContent = isLogin ? 'Organizer Login' : 'Create Account';
            authDesc.textContent  = isLogin ? 'Manage your events and tickets.' : 'Start hosting your own events today.';
        }

        let pendingTotpToken = '';
        let totpUsingBackupCode = false;

        function showTotpState(pendingToken) {
            pendingTotpToken = pendingToken;
            totpUsingBackupCode = false;
            document.getElementById('authForm').style.display  = 'none';
            document.getElementById('forgotRow').style.display = 'none';
            document.getElementById('toggleRow').style.display = 'none';
            document.getElementById('totpState').style.display = 'block';
            authTitle.textContent = 'Two-Factor Authentication';
            authDesc.textContent  = '';
            applyTotpMode();
            document.getElementById('totpCode').focus();
        }

        // Toggles the code field between a 6-digit authenticator code and a
        // one-time backup code (10 chars, letters+digits) — same endpoint
        // either way, the server tries TOTP first and falls back to a
        // backup-code match.
        function toggleTotpMode() {
            totpUsingBackupCode = !totpUsingBackupCode;
            applyTotpMode();
            document.getElementById('totpCode').focus();
        }

        function applyTotpMode() {
            const input = document.getElementById('totpCode');
            input.value = '';
            if (totpUsingBackupCode) {
                document.getElementById('totpPrompt').textContent = 'Enter one of your backup codes.';
                document.getElementById('totpCodeLabel').textContent = 'Backup Code';
                input.maxLength = 12;
                input.inputMode = 'text';
                input.autocapitalize = 'characters';
                input.placeholder = 'XXXXXXXXXX';
                input.style.letterSpacing = '1px';
                document.getElementById('totpModeToggle').textContent = 'Use your authenticator app instead';
            } else {
                document.getElementById('totpPrompt').textContent = 'Enter the 6-digit code from your authenticator app.';
                document.getElementById('totpCodeLabel').textContent = 'Authentication Code';
                input.maxLength = 6;
                input.inputMode = 'numeric';
                input.removeAttribute('autocapitalize');
                input.placeholder = '123456';
                input.style.letterSpacing = '3px';
                document.getElementById('totpModeToggle').textContent = 'Use a backup code instead';
            }
        }

        async function submitTotp() {
            const code = document.getElementById('totpCode').value.trim();
            const remember = document.getElementById('totpRemember').checked;
            if (totpUsingBackupCode) {
                if (code.length < 6) { alert('Enter one of your backup codes.'); return; }
            } else if (!/^\d{6}$/.test(code)) {
                alert('Enter the 6-digit code from your app.'); return;
            }
            const btn = document.getElementById('totpSubmitBtn');
            btn.disabled = true;
            btn.textContent = 'Verifying…';
            try {
                const r = await fetch('/api/auth/login/totp-verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pendingToken: pendingTotpToken, code, remember })
                });
                const data = await r.json();
                if (data.success) {
                    if (data.usedBackupCode) alert('Signed in with a backup code. Check Account Settings if you\'re running low.');
                    const next = new URLSearchParams(window.location.search).get('next');
                    window.location.href = (next && next.startsWith('/')) ? next : '/dashboard.html';
                } else {
                    alert(data.error || 'Invalid code');
                }
            } catch { alert('Connection error'); }
            finally {
                btn.disabled = false;
                btn.textContent = 'Verify';
            }
        }

        async function resendVerification() {
            const btn = document.getElementById('resendBtn');
            btn.disabled = true;
            btn.textContent = 'Sending…';
            try {
                await fetch('/api/auth/resend-verify', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: pendingVerifyEmail }) });
                btn.textContent = 'Email sent!';
                setTimeout(() => { btn.textContent = 'Resend verification email'; btn.disabled = false; }, 3000);
            } catch {
                btn.textContent = 'Failed — try again';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
