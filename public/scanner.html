<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Scanner | WTS Tickets</title>
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="WTS Tickets">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <script src="/html5-qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100dvh;
            color: #fff;
        }

        /* ── Camera fills screen ── */
        #reader {
            position: fixed !important;
            inset: 0 !important;
            width: 100% !important;
            height: 100% !important;
            overflow: hidden !important;
            background: #000;
        }
        #reader > div {
            position: absolute !important;
            inset: 0 !important;
            width: 100% !important;
            height: 100% !important;
            padding: 0 !important;
            border: none !important;
        }
        #reader video {
            position: absolute !important;
            inset: 0 !important;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }
        #reader canvas,
        #reader img { display: none !important; }
        #reader__dashboard { display: none !important; }
        div[id$="__box_left"], div[id$="__box_right"],
        div[id$="__box_top"],  div[id$="__box_bottom"] {
            background: transparent !important;
            box-shadow: none !important;
        }
        div[id$="__qr_region"] { border: none !important; }

        /* ── Scan corner guides ── */
        .scan-guide {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .scan-box {
            width: min(62vw, 240px);
            aspect-ratio: 1;
            position: relative;
        }
        .scan-box::before, .scan-box::after,
        .scan-box > span::before, .scan-box > span::after {
            content: '';
            position: absolute;
            width: 22px; height: 22px;
            border-color: rgba(255,255,255,0.85);
            border-style: solid;
        }
        .scan-box::before       { top:0;    left:0;  border-width: 3px 0 0 3px; border-radius: 3px 0 0 0; }
        .scan-box::after        { top:0;    right:0; border-width: 3px 3px 0 0; border-radius: 0 3px 0 0; }
        .scan-box > span::before{ bottom:0; left:0;  border-width: 0 0 3px 3px; border-radius: 0 0 0 3px; }
        .scan-box > span::after { bottom:0; right:0; border-width: 0 3px 3px 0; border-radius: 0 0 3px 0; }

        /* ── Top bar ── */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: calc(env(safe-area-inset-top, 0px) + 12px) 14px 12px;
            z-index: 20;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .pill-btn {
            background: rgba(0,0,0,0.55);
            color: #fff;
            border: none;
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            text-decoration: none;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .room-wrap {
            flex: 1;
            min-width: 0;
            position: relative;
        }
        .room-wrap::after {
            content: '▾';
            position: absolute;
            right: 11px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            pointer-events: none;
        }
        #roomSelect {
            width: 100%;
            background: rgba(0,0,0,0.55);
            color: #fff;
            border: none;
            padding: 7px 28px 7px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            appearance: none;
            -webkit-appearance: none;
        }
        #roomSelect option { background: #1c1c1e; color: #fff; }

        /* ── Slide-down scan banner (non-blocking) ── */
        #scanBanner {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 60;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: calc(env(safe-area-inset-top, 0px) + 10px) 18px 14px;
            transform: translateY(-110%);
            transition: transform 0.32s cubic-bezier(0.34, 1.4, 0.64, 1);
            pointer-events: none;
        }
        #scanBanner.show {
            transform: translateY(0);
            pointer-events: auto;
        }
        .sb-icon { font-size: 26px; line-height: 1; flex-shrink: 0; }
        .sb-text { flex: 1; min-width: 0; }
        .sb-name { font-size: 19px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sb-status { font-size: 13px; color: rgba(255,255,255,0.75); font-weight: 500; margin-top: 1px; }

        /* ── Recent scans history strip ── */
        #recentScans {
            position: fixed;
            bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
            left: 16px; right: 16px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 5px;
            pointer-events: none;
        }
        .scan-history-item {
            display: flex;
            align-items: center;
            gap: 9px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 10px;
            padding: 8px 13px;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(12px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        .shi-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .shi-dot-green  { background: #4ade80; }
        .shi-dot-orange { background: #fb923c; }
        .shi-dot-red    { background: #f87171; }
        .shi-name { font-size: 14px; font-weight: 600; color: #fff; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .shi-meta { font-size: 12px; color: rgba(255,255,255,0.45); white-space: nowrap; }

        /* ── Full-screen result overlay — reentry exit confirm only ── */
        #resultOverlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: stretch;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease-in-out;
        }
        #resultOverlay.show { opacity: 1; pointer-events: auto; }

        .ro-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            padding: calc(env(safe-area-inset-top,0px) + 64px) 32px calc(env(safe-area-inset-bottom,0px) + 56px);
            overflow-y: auto;
            gap: 24px;
        }
        .ro-top { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; }
        .ro-icon  { font-size: 72px; line-height: 1; }
        .ro-title { font-size: 22px; font-weight: 600; color: rgba(255,255,255,0.85); }
        .ro-name  { font-size: 38px; font-weight: 700; color: #fff; line-height: 1.1; word-break: break-word; }
        .ro-sub   { font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.75); }
        .ro-event { font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.7); margin-top: -4px; }

        .ro-fields { width: 100%; display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
        .ro-field {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.15); border-radius: 10px; padding: 9px 14px;
        }
        .ro-field-label { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.7); text-align: left; }
        .ro-field-value { font-size: 14px; font-weight: 500; color: #fff; text-align: right; margin-left: 12px; }

        .ro-bottom { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 14px; }
        .ro-confirm-btn {
            width: 100%; padding: 15px; border: none; border-radius: 14px;
            font-size: 17px; font-weight: 700; cursor: pointer;
            background: rgba(255,255,255,0.92);
            transition: opacity 0.15s;
        }
        .ro-confirm-btn:active { opacity: 0.75; }
        .ro-cancel-btn {
            background: none; border: none; color: rgba(255,255,255,0.75);
            font-size: 16px; font-weight: 600; cursor: pointer; padding: 4px 16px;
        }
        .ro-pill-btn {
            background: rgba(255,255,255,0.2); border: none; color: #fff;
            font-size: 14px; font-weight: 600; padding: 10px 22px;
            border-radius: 22px; cursor: pointer; transition: opacity 0.15s;
        }
        .ro-pill-btn:active { opacity: 0.7; }
        .ro-hint { font-size: 13px; color: rgba(255,255,255,0.35); }

        /* ── Sheet backdrop (list sheet only) ── */
        .backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 40;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .backdrop.show { opacity: 1; pointer-events: auto; }

        /* ── Bottom sheet base (list only) ── */
        .sheet {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #1c1c1e;
            border-radius: 20px 20px 0 0;
            z-index: 45;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            display: flex;
            flex-direction: column;
            padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 8px);
        }
        .sheet.show { transform: translateY(0); }
        .sheet-handle {
            width: 36px; height: 4px;
            background: rgba(255,255,255,0.25);
            border-radius: 2px;
            margin: 10px auto 0;
            flex-shrink: 0;
        }

        .action-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 16px; font-weight: 700;
            cursor: pointer;
            margin-bottom: 8px;
            transition: opacity 0.15s;
        }
        .action-btn:active { opacity: 0.75; }
        .btn-secondary { background: rgba(255,255,255,0.12); color: #fff; }

        /* ── List sheet ── */
        #listSheet { max-height: 95dvh; }

        .list-header {
            padding: 10px 16px 10px;
            flex-shrink: 0;
        }
        .list-title {
            font-size: 18px; font-weight: 700;
            margin-bottom: 10px;
            padding-left: 4px;
        }
        .search-wrap {
            position: relative;
        }
        .search-icon {
            position: absolute;
            left: 11px; top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: rgba(255,255,255,0.38);
            display: flex;
        }
        #searchInput {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 12px;
            padding: 10px 12px 10px 36px;
            color: #fff;
            font-size: 15px;
        }
        #searchInput::placeholder { color: rgba(255,255,255,0.32); }
        #searchInput:focus { outline: none; background: rgba(255,255,255,0.14); }

        .list-stats {
            font-size: 13px; font-weight: 600;
            color: rgba(255,255,255,0.45);
            padding: 4px 20px 8px;
            flex-shrink: 0;
        }

        /* ── Attendee list ── */
        #attendeeList {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Section headers */
        .list-section {
            padding: 14px 16px 6px;
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.7px;
            color: rgba(255,255,255,0.3);
            display: flex; align-items: center; gap: 8px;
            flex-shrink: 0;
        }
        .list-section-count {
            font-size: 11px; font-weight: 600;
            background: rgba(255,255,255,0.1);
            padding: 1px 7px; border-radius: 10px;
            letter-spacing: 0;
        }

        /* Person rows — iOS table style */
        .person-row {
            margin: 0 12px 2px;
            border-radius: 13px;
            overflow: hidden;
            background: rgba(255,255,255,0.07);
        }
        .person-row + .person-row { margin-top: 2px; }

        .person-main {
            display: flex;
            align-items: center;
            gap: 13px;
            padding: 11px 14px 11px 12px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            min-height: 64px;
        }

        /* Initials avatar */
        .avatar {
            width: 42px; height: 42px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; font-weight: 700;
            flex-shrink: 0;
            letter-spacing: -0.5px;
        }
        .av-pending { background: rgba(255,255,255,0.1);  color: rgba(255,255,255,0.6); }
        .av-partial { background: rgba(251,191,36,0.18);  color: #fbbf24; }
        .av-done    { background: rgba(74,222,128,0.18);  color: #4ade80; }

        .person-info { flex: 1; min-width: 0; }
        .person-name {
            font-size: 16px; font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-bottom: 2px;
        }
        .person-status {
            font-size: 12px; color: rgba(255,255,255,0.4);
            display: flex; align-items: center; gap: 5px;
        }
        .status-dot {
            width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
        }
        .sd-pending { background: rgba(255,255,255,0.3); }
        .sd-partial { background: #fbbf24; }
        .sd-done    { background: #4ade80; }

        .row-checkin-btn {
            background: #fff;
            border: none; color: #1a1f3c;
            font-size: 13px; font-weight: 700;
            padding: 8px 16px; border-radius: 20px;
            cursor: pointer; white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
        }
        .row-checkin-btn:active { opacity: 0.65; }
        .row-done-label {
            font-size: 13px; font-weight: 600;
            color: #4ade80; flex-shrink: 0;
        }

        .expand-arrow {
            font-size: 14px; font-weight: 300;
            color: rgba(255,255,255,0.25);
            transition: transform 0.22s;
            flex-shrink: 0; margin-left: 2px;
        }
        .person-row.open .expand-arrow { transform: rotate(90deg); }

        .ticket-rows { display: none; border-top: 1px solid rgba(255,255,255,0.07); }
        .person-row.open .ticket-rows { display: block; }

        .ticket-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .ticket-item:last-child { border-bottom: none; }
        .ticket-dot {
            width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
        }
        .tdot-used    { background: #4ade80; }
        .tdot-pending { background: rgba(255,255,255,0.2); }
        .ticket-label { flex: 1; font-size: 14px; color: rgba(255,255,255,0.7); }
        .ticket-time  { font-size: 12px; color: rgba(255,255,255,0.3); }
        .ticket-btn {
            background: rgba(255,255,255,0.12); border: none;
            color: #fff; font-size: 12px; font-weight: 700;
            padding: 5px 12px; border-radius: 8px; cursor: pointer;
            white-space: nowrap;
        }
        .ticket-btn:active { opacity: 0.7; }
        .ticket-scanned { font-size: 12px; font-weight: 700; color: #4ade80; }

        .list-close {
            padding: 6px 16px 4px;
            flex-shrink: 0;
        }
        .list-empty {
            text-align: center;
            color: rgba(255,255,255,0.3);
            padding: 40px 20px;
            font-size: 14px;
        }

        /* ── iOS-style tab bar ── */
        .tab-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 25;
            display: none;
            flex-direction: column;
            background: rgba(10,10,10,0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .tab-bar-inner {
            display: flex;
            height: 49px;
        }
        .tab-bar-safe {
            height: env(safe-area-inset-bottom, 0px);
        }
        .tab-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            font-size: 10px;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.15s;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .tab-btn.active { color: #fff; }
        .tab-btn svg { width: 22px; height: 22px; }

        body.has-tab-bar #recentScans {
            bottom: calc(49px + env(safe-area-inset-bottom, 0px) + 16px);
        }
        body.has-tab-bar #iosBanner {
            bottom: calc(49px + env(safe-area-inset-bottom, 0px) + 12px);
        }

        /* ── Scan detail sheet ── */
        .scan-history-item { cursor: pointer; pointer-events: auto; }
        #detailSheet { max-height: 82dvh; }
        .det-header {
            padding: 28px 20px 22px; text-align: center;
            border-radius: 0;
        }
        .det-icon  { font-size: 52px; line-height: 1; margin-bottom: 8px; }
        .det-status{ font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.78); margin-bottom: 4px; }
        .det-name  { font-size: 32px; font-weight: 800; color: #fff; line-height: 1.1; word-break: break-word; }
        .det-body  { padding: 0 20px 24px; }
        .det-row {
            display: flex; justify-content: space-between; align-items: flex-start;
            gap: 16px; padding: 13px 0;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .det-row:last-child { border-bottom: none; }
        .det-label { font-size: 14px; color: rgba(255,255,255,0.42); flex-shrink: 0; }
        .det-val   { font-size: 14px; font-weight: 500; color: #fff; text-align: right; word-break: break-word; }
    </style>
</head>
<body>

<div id="reader"></div>

<div class="scan-guide"><div class="scan-box"><span></span></div></div>

<!-- Slide-down scan result banner -->
<div id="scanBanner">
    <div class="sb-icon" id="sbIcon"></div>
    <div class="sb-text">
        <div class="sb-name"   id="sbName"></div>
        <div class="sb-status" id="sbStatus"></div>
    </div>
</div>

<!-- Recent scan history strip (bottom) -->
<div id="recentScans"></div>

<!-- Top bar: anon shows sign-in, auth shows room picker + list btn -->
<div class="top-bar" id="topBar">
    <a id="signInBtn" class="pill-btn" href="/login.html" style="display:none;">Sign In</a>

    <div class="room-wrap" id="roomWrap" style="display:none;">
        <select id="roomSelect"><option value="">Loading rooms…</option></select>
    </div>
    <button class="pill-btn" id="listBtn" style="display:none;" onclick="openList()">Manual Check-In</button>
</div>

<!-- Full-screen scan result overlay -->
<div id="resultOverlay" onclick="handleOverlayTap(event)">
    <div class="ro-content">
        <div class="ro-top">
            <div class="ro-icon"  id="roIcon"></div>
            <div class="ro-title" id="roTitle"></div>
            <div class="ro-name"  id="roName"></div>
            <div class="ro-sub"   id="roEmail"></div>
            <div class="ro-event" id="roEvent"></div>
            <div class="ro-fields" id="roFields"></div>
        </div>
        <div class="ro-bottom" id="roBottom"></div>
    </div>
</div>

<!-- iOS Add to Home Screen nudge (Safari only, not shown if already installed) -->
<div id="iosBanner" style="display:none; position:fixed; bottom:calc(env(safe-area-inset-bottom,0px) + 84px); left:14px; right:14px; z-index:30; background:rgba(28,28,30,0.96); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-radius:16px; padding:14px 16px; border:1px solid rgba(255,255,255,0.12); box-shadow:0 8px 32px rgba(0,0,0,0.5);">
    <button onclick="dismissIOSBanner()" style="position:absolute;top:10px;right:12px;background:none;border:none;color:rgba(255,255,255,0.45);font-size:20px;line-height:1;cursor:pointer;padding:2px 6px;">×</button>
    <div style="display:flex;align-items:center;gap:12px;">
        <div style="flex-shrink:0;width:36px;height:36px;background:#c4294a;border-radius:9px;display:flex;align-items:center;justify-content:center;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></svg></div>
        <div>
            <div style="font-size:14px;font-weight:700;color:#fff;margin-bottom:3px;">Add to Home Screen</div>
            <div style="font-size:12px;color:rgba(255,255,255,0.55);line-height:1.5;">Tap <svg style="display:inline;vertical-align:middle;margin:0 2px;" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> then <strong style="color:#fff;">"Add to Home Screen"</strong></div>
        </div>
    </div>
    <div style="position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:14px;height:8px;overflow:hidden;">
        <div style="width:14px;height:14px;background:rgba(28,28,30,0.96);border:1px solid rgba(255,255,255,0.12);transform:rotate(45deg);transform-origin:top left;margin-left:1px;"></div>

<!-- Backdrop for list sheet only -->
<div class="backdrop" id="listBackdrop" onclick="closeList()"></div>

<div class="sheet" id="listSheet">

                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </span>
            <input type="search" id="searchInput" placeholder="Search attendees…" oninput="filterList()" autocomplete="off">

<!-- Scan detail sheet (tap recent scan card to open) -->
<div class="backdrop" id="detailBackdrop" onclick="closeDetail()"></div>
<div class="sheet" id="detailSheet">
    <div class="sheet-handle"></div>
    <div id="detailContent" style="overflow-y:auto;-webkit-overflow-scrolling:touch;max-height:75dvh;"></div>
</div>

<script>
// ── Audio ─────────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const comp = audioCtx.createDynamicsCompressor();
comp.connect(audioCtx.destination);

function playSound(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (type === 'success') {
        // C5 → A5, matching iOS timing: note at 0ms, note at 180ms
        [[523.25, 0, 0.22], [880, 180, 0.32]].forEach(([hz, ms, dur]) => setTimeout(() => {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.connect(g); g.connect(comp);
            o.type = 'sine'; o.frequency.value = hz;
            g.gain.setValueAtTime(2.5, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            o.start(); o.stop(audioCtx.currentTime + dur);
        }, ms));
    } else {
        // A3 → A#2 square, matching iOS timing: note at 0ms, note at 180ms
        [[220, 0, 0.18], [180, 180, 0.32]].forEach(([hz, ms, dur]) => setTimeout(() => {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.type = 'square'; o.frequency.value = hz;
            g.gain.setValueAtTime(0.8, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            o.start(); o.stop(audioCtx.currentTime + dur);
        }, ms));
    }
}

// ── State ─────────────────────────────────────────────────
let isLoggedIn      = false;
let currentUser     = null;
let events          = [];
let allAttendees    = [];   // grouped registrations for selected event
let filteredAttendees = [];
let lastScannedRegistrationId = null;
let lastScannedToken  = null;
let lastScanTs        = 0;
const SCAN_DEBOUNCE_MS = 5000;
let pendingCheckoutToken = null;

// ── Init ──────────────────────────────────────────────────
(async () => {
    try {
        const r = await fetch('/api/auth/me');
        if (r.ok) {
            isLoggedIn = true;
            const data = await r.json();
            currentUser = data.user;
        }
    } catch (_) {}

    if (isLoggedIn) {
        document.getElementById('roomWrap').style.display = 'block';
        document.getElementById('tabBar').style.display   = 'flex';
        document.body.classList.add('has-tab-bar');
        await loadEvents();
    } else {
        document.getElementById('signInBtn').style.display = 'block';
    }
    startCamera();
})();

// ── Events / rooms ────────────────────────────────────────
async function loadEvents() {
    try {
        const r = await fetch('/api/events');
        events = await r.json();
    } catch (_) { events = []; }

    const sel = document.getElementById('roomSelect');
    if (!events.length) {
        sel.innerHTML = '<option value="">No rooms</option>';
        return;
    }
    sel.innerHTML = events.map(e =>
        `<option value="${escAttr(e.id)}">${escHtml(e.name)}</option>`
    ).join('');
    sel.addEventListener('change', () => {
        allAttendees = [];
        filteredAttendees = [];
    });
}

function selectedEvent() {
    const sel = document.getElementById('roomSelect');
    return events.find(e => e.id === sel.value) || null;
}

// ── List sheet ────────────────────────────────────────────
async function openList() {
    const ev = selectedEvent();
    document.getElementById('listTitle').textContent = ev ? ev.name : 'Check-In List';
    document.getElementById('searchInput').value = '';
    document.getElementById('attendeeList').innerHTML = '<div class="list-empty">Loading…</div>';
    document.getElementById('listStats').textContent = '';

    document.getElementById('listBackdrop').classList.add('show');
    document.getElementById('listSheet').classList.add('show');
    setActiveTab('list');

    if (ev) await loadAttendees(ev.id);
}

function closeList() {
    closeListSheet();
    setActiveTab('scanner');
}

function switchTab(tab) {
    if (tab === 'list') openList();
    else closeList();
}

function setActiveTab(tab) {
    const ts = document.getElementById('tabScanner');
    const tl = document.getElementById('tabList');
    if (!ts) return;
    ts.classList.toggle('active', tab === 'scanner');
    tl.classList.toggle('active', tab === 'list');
}

// ── Scan detail sheet ─────────────────────────────────────
let lastScanData = null;

function openDetail() {
    if (!lastScanData) return;
    const d      = lastScanData;
    const status = d.status || 'error';
    const bg     = OVERLAY_COLORS[status] || OVERLAY_COLORS.error;
    const icon   = STATUS_ICONS[status]   || '!';
    const title  = STATUS_TITLES[status]  || 'Error';

    let rows = '';
    if (d.email)     rows += detRow('Email',  d.email);
    if (d.eventName) rows += detRow('Event',  d.eventName);
    if (d.used_at && status === 'used') {
        const t = new Date(d.used_at);
        rows += detRow('Checked in',
            t.toLocaleTimeString([], { hour:'numeric', minute:'2-digit' }) + ', ' +
            t.toLocaleDateString([], { month:'short', day:'numeric' }));
    }
    if (d.customFields) {
        Object.entries(d.customFields).forEach(([k, v]) => { rows += detRow(k, v); });
    }

    document.getElementById('detailContent').innerHTML = `
        <div class="det-header" style="background:${bg}">
            <div class="det-icon">${icon}</div>
            <div class="det-status">${escHtml(title)}</div>
            <div class="det-name">${escHtml(d.firstName || d.name || '')}</div>
        </div>
        ${rows ? `<div class="det-body">${rows}</div>` : ''}`;

    document.getElementById('detailBackdrop').classList.add('show');
    document.getElementById('detailSheet').classList.add('show');
}

function detRow(label, value) {
    return `<div class="det-row"><span class="det-label">${escHtml(label)}</span><span class="det-val">${escHtml(value)}</span></div>`;
}

function closeDetail() {
    document.getElementById('detailBackdrop').classList.remove('show');
    document.getElementById('detailSheet').classList.remove('show');
}

async function openListFromResult() {
    closeResult();
    await openList();
    if (lastScannedRegistrationId) {
        setTimeout(() => {
            const el = document.getElementById(`reg-${lastScannedRegistrationId}`);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                el.style.outline = '2px solid rgba(255,255,255,0.4)';
                setTimeout(() => el.style.outline = '', 1500);
            }
        }, 400);
    }
}

async function loadAttendees(eventId) {
    try {
        const r = await fetch(`/api/event/${eventId}/tickets`);
        if (!r.ok) throw new Error();
        const tickets = await r.json();

        // Group by registrationId
        const groups = {};
        for (const t of tickets) {
            const rid = t.registrationId || t.id;
            if (!groups[rid]) groups[rid] = { registrationId: rid, name: t.name, email: t.email, tickets: [] };
            groups[rid].tickets.push(t);
        }
        allAttendees = Object.values(groups).sort((a, b) => a.name.localeCompare(b.name));
    } catch (_) {
        allAttendees = [];
    }
    filterList();
}

function filterList() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    filteredAttendees = q
        ? allAttendees.filter(a => a.name.toLowerCase().includes(q) || (a.email || '').toLowerCase().includes(q))
        : allAttendees;
    renderList();
}

function renderList() {
    const container = document.getElementById('attendeeList');
    const statsEl   = document.getElementById('listStats');

    if (!allAttendees.length) {
        container.innerHTML = '<div class="list-empty">No attendees found</div>';
        statsEl.textContent = '';
        return;
    }

    const totalTickets   = allAttendees.reduce((n, a) => n + a.tickets.length, 0);
    const scannedTickets = allAttendees.reduce((n, a) => n + a.tickets.filter(t => t.used_at).length, 0);
    const pct = totalTickets ? Math.round(scannedTickets / totalTickets * 100) : 0;
    statsEl.textContent = `${scannedTickets} / ${totalTickets} checked in · ${pct}%`;

    if (!filteredAttendees.length) {
        container.innerHTML = '<div class="list-empty">No results</div>';
        return;
    }

    // Partition: pending (none checked), partial, done (all checked)
    const pending = filteredAttendees.filter(a => a.tickets.every(t => !t.used_at));
    const partial = filteredAttendees.filter(a => a.tickets.some(t => t.used_at) && a.tickets.some(t => !t.used_at));
    const done    = filteredAttendees.filter(a => a.tickets.every(t => t.used_at));

    let html = '';
    const needingAction = [...pending, ...partial];

    if (needingAction.length) {
        html += `<div class="list-section">Pending<span class="list-section-count">${needingAction.length}</span></div>`;
        html += needingAction.map(a => buildPersonRow(a)).join('');
    }
    if (done.length) {
        html += `<div class="list-section" style="margin-top:6px;">Checked In<span class="list-section-count">${done.length}</span></div>`;
        html += done.map(a => buildPersonRow(a)).join('');
    }
    html += '<div style="height:12px;"></div>';

    container.innerHTML = html;
}

function buildPersonRow(a) {
    const total   = a.tickets.length;
    const scanned = a.tickets.filter(t => t.used_at).length;
    const allDone = scanned === total;
    const noDone  = scanned === 0;

    const initials = a.name.trim().split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
    const avClass  = allDone ? 'av-done' : noDone ? 'av-pending' : 'av-partial';
    const sdClass  = allDone ? 'sd-done'    : noDone ? 'sd-pending' : 'sd-partial';

    const statusTxt = allDone
        ? (total === 1 ? 'Checked in' : `All ${total} tickets checked in`)
        : noDone
        ? (total === 1 ? '1 ticket · Pending' : `${total} tickets · None checked in`)
        : `${scanned} of ${total} checked in`;

    const actionHtml = allDone
        ? `<div class="row-done-label">Done</div>`
        : `<button class="row-checkin-btn" onclick="checkInPerson(event,'${escAttr(a.registrationId)}')">Check In</button>`;

    const expandArrow = total > 1 ? `<div class="expand-arrow">›</div>` : '';

    const ticketRows = total > 1 ? a.tickets.map((t, i) => {
        const time = t.used_at ? new Date(t.used_at).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }) : null;
        return `
            <div class="ticket-item" id="ticket-${escAttr(t.id)}">
                <div class="ticket-dot ${t.used_at ? 'tdot-used' : 'tdot-pending'}"></div>
                <div class="ticket-label">Ticket ${i + 1}</div>
                ${time ? `<div class="ticket-time">${escHtml(time)}</div>` : ''}
                ${t.used_at
                    ? `<div class="ticket-scanned">✓</div>`
                    : `<button class="ticket-btn" onclick="checkInTicket(event,'${escAttr(t.id)}','${escAttr(a.registrationId)}')">Check In</button>`
                }
            </div>`;
    }).join('') : '';

    return `
        <div class="person-row" id="reg-${escAttr(a.registrationId)}">
            <div class="person-main" onclick="togglePerson('${escAttr(a.registrationId)}')">
                <div class="avatar ${avClass}">${escHtml(initials)}</div>
                <div class="person-info">
                    <div class="person-name">${escHtml(a.name)}</div>
                    <div class="person-status">
                        <span class="status-dot ${sdClass}"></span>
                        ${escHtml(statusTxt)}
                    </div>
                </div>
                <div onclick="event.stopPropagation()">${actionHtml}</div>
                ${expandArrow}
            </div>
            ${total > 1 ? `<div class="ticket-rows">${ticketRows}</div>` : ''}
        </div>`;
}

function togglePerson(rid) {
    const el = document.getElementById(`reg-${rid}`);
    if (el) el.classList.toggle('open');
}

async function checkInTicket(e, ticketId, registrationId) {
    e.stopPropagation();
    const btn = e.target;
    btn.textContent = '…'; btn.disabled = true;
    try {
        const r = await fetch(`/api/checkin/${ticketId}`, { method: 'POST' });
        if (r.ok) {
            // Update local data
            const attendee = allAttendees.find(a => a.registrationId === registrationId);
            if (attendee) {
                const t = attendee.tickets.find(t => t.id === ticketId);
                if (t) t.used_at = new Date().toISOString();
            }
            playSound('success');
            filterList();
            // Re-open the person row
            setTimeout(() => {
                const row = document.getElementById(`reg-${registrationId}`);
                if (row && !row.classList.contains('open')) row.classList.add('open');
            }, 50);
        } else {
            btn.textContent = 'Check In'; btn.disabled = false;
        }
    } catch (_) { btn.textContent = 'Check In'; btn.disabled = false; }
}

async function checkInPerson(e, registrationId) {
    e.stopPropagation();
    const btn = e.target;
    btn.textContent = '…'; btn.disabled = true;
    try {
        const r = await fetch(`/api/checkin/${registrationId}`, { method: 'POST' });
        if (r.ok) {
            const now = new Date().toISOString();
            const attendee = allAttendees.find(a => a.registrationId === registrationId);
            if (attendee) attendee.tickets.forEach(t => { if (!t.used_at) t.used_at = now; });
            playSound('success');
            filterList();
        } else {
            btn.textContent = 'Check In All'; btn.disabled = false;
        }
    } catch (_) { btn.textContent = 'Check In All'; btn.disabled = false; }
}

// ── Scan result display ───────────────────────────────────
const OVERLAY_COLORS = {
    valid:         'rgba(22,163,74,0.95)',
    reentry_enter: 'rgba(22,163,74,0.95)',
    reentry_exit:  'rgba(234,88,12,0.95)',
    used:          'rgba(234,88,12,0.95)',
    invalid:       'rgba(220,38,38,0.95)',
    error:         'rgba(220,38,38,0.95)',
};
const STATUS_ICONS   = { valid:'✓', reentry_enter:'↩', reentry_exit:'↩', used:'!', invalid:'✕', error:'✕' };
const STATUS_TITLES  = { valid:'Checked In!', reentry_enter:'Checked Back In!', reentry_exit:'Confirm Check-Out', used:'Already Checked In', invalid:'Invalid QR', error:'Error' };
const STATUS_DOT_CLS = { valid:'shi-dot-green', reentry_enter:'shi-dot-green', used:'shi-dot-orange', reentry_exit:'shi-dot-orange', invalid:'shi-dot-red', error:'shi-dot-red' };

let recentScansList = [];
let bannerTimer = null;

// Non-blocking slide-down banner (used for everything except reentry_exit)
function showBanner(data) {
    const status = data.status || 'error';
    const banner = document.getElementById('scanBanner');
    banner.style.background = OVERLAY_COLORS[status] || OVERLAY_COLORS.error;
    document.getElementById('sbIcon').textContent   = STATUS_ICONS[status]  || '!';
    document.getElementById('sbName').textContent   = data.firstName || data.name || '';
    document.getElementById('sbStatus').textContent = STATUS_TITLES[status] || 'Error';
    banner.classList.add('show');
    clearTimeout(bannerTimer);
    bannerTimer = setTimeout(hideBanner, 1400);
    addToHistory(data, status);
}
function hideBanner() { document.getElementById('scanBanner').classList.remove('show'); }

function addToHistory(data, status) {
    lastScanData = { ...data, status };
    recentScansList = [{
        dotCls: STATUS_DOT_CLS[status] || 'shi-dot-red',
        name:   data.firstName || data.name || 'Unknown',
        meta:   `${STATUS_TITLES[status] || 'Error'} · ${new Date().toLocaleTimeString([], { hour:'numeric', minute:'2-digit' })}`
    }];
    const s = recentScansList[0];
    document.getElementById('recentScans').innerHTML = `
        <div class="scan-history-item" onclick="openDetail()">
            <div class="shi-dot ${s.dotCls}"></div>
            <div class="shi-name">${escHtml(s.name)}</div>
            <div class="shi-meta">${escHtml(s.meta)}</div>
        </div>`;
}

// Full-screen overlay — reentry exit only (needs explicit confirm)
function openExitConfirm(data) {
    lastScannedRegistrationId = data.registrationId || null;
    pendingCheckoutToken = data._token || null;
    const overlay = document.getElementById('resultOverlay');
    overlay.style.background = OVERLAY_COLORS.reentry_exit;
    document.getElementById('roIcon').textContent  = '↩';
    document.getElementById('roTitle').textContent = 'Confirm Check-Out';
    document.getElementById('roName').textContent  = data.firstName || data.name || '';
    document.getElementById('roEmail').style.display = 'none';
    document.getElementById('roEvent').style.display = 'none';
    document.getElementById('roFields').innerHTML = '';
    document.getElementById('roBottom').innerHTML = `
        <button class="ro-confirm-btn" id="roConfirmBtn" onclick="confirmCheckout()" style="color:rgba(180,60,0,1);">Confirm Check-Out</button>
        <button class="ro-cancel-btn" onclick="closeResult()">Cancel</button>`;
    overlay.classList.add('show');
}

function closeResult() {
    document.getElementById('resultOverlay').classList.remove('show');
    pendingCheckoutToken = null;
}

function handleOverlayTap(e) {
    if (e.target.tagName === 'BUTTON') return;
    if (pendingCheckoutToken) return;
    closeResult();
}

async function confirmCheckout() {
    if (!pendingCheckoutToken) { closeResult(); return; }
    const btn = document.getElementById('roConfirmBtn');
    if (btn) { btn.textContent = 'Checking out…'; btn.disabled = true; }
    try {
        await fetch('/api/checkout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: pendingCheckoutToken })
        });
        playSound('success');
    } catch (_) {}
    closeResult();
}

// ── Scan handler ──────────────────────────────────────────
function onScanSuccess(decodedText) {
    if (!decodedText.startsWith('ticket:')) return;

    const token = decodedText.split(':')[1].trim();
    const now = Date.now();

    // Per-token debounce — same QR within 5s is ignored
    if (token === lastScannedToken && (now - lastScanTs) < SCAN_DEBOUNCE_MS) return;
    lastScannedToken = token;
    lastScanTs = now;

    // Camera keeps running — no isProcessing block

    fetch('/api/validate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token })
    })
    .then(r => r.json())
    .then(data => {
        data._token = token;
        const isSuccess = data.status === 'valid' || data.status === 'reentry_enter';
        playSound(isSuccess ? 'success' : 'error');
        if (data.status === 'reentry_exit') {
            openExitConfirm(data);
        } else {
            showBanner(data);
        }
    })
    .catch(() => {
        playSound('error');
        showBanner({ status: 'error', name: 'Server Error' });
    });
}

// ── Camera ────────────────────────────────────────────────
function startCamera() { /* camera is started inline below */ }
const scanner = new Html5Qrcode('reader');
scanner.start(
    { facingMode: 'environment' },
    { fps: 15 },
    onScanSuccess
).then(() => {
    const video = document.querySelector('#reader video');
    if (video) Object.assign(video.style, {
        position: 'absolute', inset: '0',
        width: '100%', height: '100%', objectFit: 'cover'
    });
    const region = document.getElementById('reader__scan_region');
    if (region) Object.assign(region.style, {
        position: 'absolute', inset: '0', width: '100%', height: '100%'
    });
}).catch(err => console.error('Camera error:', err));

// ── Utilities ─────────────────────────────────────────────
function escHtml(s)  { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s)  { return String(s ?? '').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// iOS "Add to Home Screen" nudge
const _isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const _isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
if (_isIOS && !_isStandalone && !localStorage.getItem('ios-banner-dismissed')) {
    // Slight delay so the camera UI settles first
    setTimeout(() => { document.getElementById('iosBanner').style.display = 'block'; }, 2500);
}
function dismissIOSBanner() {
    document.getElementById('iosBanner').style.display = 'none';
    localStorage.setItem('ios-banner-dismissed', '1');
}

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
}
</script>
