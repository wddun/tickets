<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Scanner | WTS Tickets</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100dvh;
            color: #fff;
        }

        /* ── Camera fills screen ── */
        #reader {
            position: fixed !important;
            inset: 0 !important;
            width: 100% !important;
            height: 100% !important;
            overflow: hidden !important;
            background: #000;
        }
        #reader > div {
            position: absolute !important;
            inset: 0 !important;
            width: 100% !important;
            height: 100% !important;
            padding: 0 !important;
            border: none !important;
        }
        #reader video {
            position: absolute !important;
            inset: 0 !important;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }
        #reader canvas,
        #reader img { display: none !important; }
        #reader__dashboard { display: none !important; }
        div[id$="__box_left"], div[id$="__box_right"],
        div[id$="__box_top"],  div[id$="__box_bottom"] {
            background: transparent !important;
            box-shadow: none !important;
        }
        div[id$="__qr_region"] { border: none !important; }

        /* ── Scan corner guides ── */
        .scan-guide {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .scan-box {
            width: min(62vw, 240px);
            aspect-ratio: 1;
            position: relative;
        }
        .scan-box::before, .scan-box::after,
        .scan-box > span::before, .scan-box > span::after {
            content: '';
            position: absolute;
            width: 22px; height: 22px;
            border-color: rgba(255,255,255,0.85);
            border-style: solid;
        }
        .scan-box::before       { top:0;    left:0;  border-width: 3px 0 0 3px; border-radius: 3px 0 0 0; }
        .scan-box::after        { top:0;    right:0; border-width: 3px 3px 0 0; border-radius: 0 3px 0 0; }
        .scan-box > span::before{ bottom:0; left:0;  border-width: 0 0 3px 3px; border-radius: 0 0 0 3px; }
        .scan-box > span::after { bottom:0; right:0; border-width: 0 3px 3px 0; border-radius: 0 0 3px 0; }

        /* ── Top bar ── */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: calc(env(safe-area-inset-top, 0px) + 12px) 14px 12px;
            z-index: 20;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .pill-btn {
            background: rgba(0,0,0,0.55);
            color: #fff;
            border: none;
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            text-decoration: none;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .room-wrap {
            flex: 1;
            min-width: 0;
            position: relative;
        }
        .room-wrap::after {
            content: '▾';
            position: absolute;
            right: 11px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            pointer-events: none;
        }
        #roomSelect {
            width: 100%;
            background: rgba(0,0,0,0.55);
            color: #fff;
            border: none;
            padding: 7px 28px 7px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            appearance: none;
            -webkit-appearance: none;
        }
        #roomSelect option { background: #1c1c1e; color: #fff; }

        /* ── Full-screen result overlay (matches iOS) ── */
        #resultOverlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: stretch;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease-in-out;
        }
        #resultOverlay.show { opacity: 1; pointer-events: auto; }

        .ro-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            padding: calc(env(safe-area-inset-top,0px) + 64px) 32px calc(env(safe-area-inset-bottom,0px) + 56px);
            overflow-y: auto;
            gap: 24px;
        }
        .ro-top { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; }
        .ro-icon  { font-size: 72px; line-height: 1; }
        .ro-title { font-size: 22px; font-weight: 600; color: rgba(255,255,255,0.85); }
        .ro-name  { font-size: 38px; font-weight: 700; color: #fff; line-height: 1.1; word-break: break-word; }
        .ro-sub   { font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.75); }
        .ro-event { font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.7); margin-top: -4px; }

        .ro-fields { width: 100%; display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
        .ro-field {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.15); border-radius: 10px; padding: 9px 14px;
        }
        .ro-field-label { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.7); text-align: left; }
        .ro-field-value { font-size: 14px; font-weight: 500; color: #fff; text-align: right; margin-left: 12px; }

        .ro-bottom { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 14px; }
        .ro-confirm-btn {
            width: 100%; padding: 15px; border: none; border-radius: 14px;
            font-size: 17px; font-weight: 700; cursor: pointer;
            background: rgba(255,255,255,0.92);
            transition: opacity 0.15s;
        }
        .ro-confirm-btn:active { opacity: 0.75; }
        .ro-cancel-btn {
            background: none; border: none; color: rgba(255,255,255,0.75);
            font-size: 16px; font-weight: 600; cursor: pointer; padding: 4px 16px;
        }
        .ro-pill-btn {
            background: rgba(255,255,255,0.2); border: none; color: #fff;
            font-size: 14px; font-weight: 600; padding: 10px 22px;
            border-radius: 22px; cursor: pointer; transition: opacity 0.15s;
        }
        .ro-pill-btn:active { opacity: 0.7; }
        .ro-hint { font-size: 13px; color: rgba(255,255,255,0.35); }

        /* ── Sheet backdrop (list sheet only) ── */
        .backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 40;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .backdrop.show { opacity: 1; pointer-events: auto; }

        /* ── Bottom sheet base (list only) ── */
        .sheet {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #1c1c1e;
            border-radius: 20px 20px 0 0;
            z-index: 45;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            display: flex;
            flex-direction: column;
            padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 8px);
        }
        .sheet.show { transform: translateY(0); }
        .sheet-handle {
            width: 36px; height: 4px;
            background: rgba(255,255,255,0.25);
            border-radius: 2px;
            margin: 10px auto 0;
            flex-shrink: 0;
        }

        .action-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 16px; font-weight: 700;
            cursor: pointer;
            margin-bottom: 8px;
            transition: opacity 0.15s;
        }
        .action-btn:active { opacity: 0.75; }
        .btn-secondary { background: rgba(255,255,255,0.12); color: #fff; }

        /* ── List sheet ── */
        #listSheet { max-height: 95dvh; }

        .list-header {
            padding: 12px 20px 10px;
            flex-shrink: 0;
        }
        .list-title {
            font-size: 18px; font-weight: 700;
            margin-bottom: 10px;
        }
        .search-wrap {
            position: relative;
        }
        .search-wrap::before {
            content: '⌕';
            position: absolute;
            left: 11px; top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: rgba(255,255,255,0.4);
            pointer-events: none;
        }
        #searchInput {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 10px;
            padding: 9px 12px 9px 32px;
            color: #fff;
            font-size: 15px;
        }
        #searchInput::placeholder { color: rgba(255,255,255,0.35); }
        #searchInput:focus { outline: none; background: rgba(255,255,255,0.14); }

        .list-stats {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            padding: 6px 20px 4px;
            flex-shrink: 0;
        }

        /* ── Attendee list ── */
        #attendeeList {
            flex: 1;
            overflow-y: auto;
            padding: 4px 16px 0;
            -webkit-overflow-scrolling: touch;
        }

        .person-row {
            background: rgba(255,255,255,0.07);
            border-radius: 14px;
            margin-bottom: 6px;
            overflow: hidden;
        }
        .person-main {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }
        .person-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .dot-all     { background: #4ade80; }
        .dot-partial { background: #fbbf24; }
        .dot-none    { background: rgba(255,255,255,0.25); }

        .person-info { flex: 1; min-width: 0; }
        .person-name {
            font-size: 15px; font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .person-count { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 1px; }

        .person-actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .checkin-all-btn {
            background: rgba(255,255,255,0.12);
            border: none;
            color: #fff;
            font-size: 12px; font-weight: 700;
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
        }
        .checkin-all-btn:active { opacity: 0.7; }
        .expand-arrow {
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .person-row.open .expand-arrow { transform: rotate(90deg); }

        .ticket-rows { display: none; padding: 0 14px 10px; }
        .person-row.open .ticket-rows { display: block; }

        .ticket-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .ticket-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .tdot-used    { background: #4ade80; }
        .tdot-pending { background: rgba(255,255,255,0.2); }

        .ticket-label {
            flex: 1;
            font-size: 14px;
            color: rgba(255,255,255,0.75);
        }
        .ticket-time {
            font-size: 11px;
            color: rgba(255,255,255,0.35);
        }
        .ticket-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            font-size: 12px; font-weight: 700;
            padding: 4px 10px;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
        }
        .ticket-btn:active { opacity: 0.7; }
        .ticket-scanned {
            font-size: 11px; font-weight: 700;
            color: #4ade80;
        }

        .list-close {
            padding: 6px 16px 4px;
            flex-shrink: 0;
        }
        .list-empty {
            text-align: center;
            color: rgba(255,255,255,0.3);
            padding: 40px 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div id="reader"></div>

<div class="scan-guide"><div class="scan-box"><span></span></div></div>

<!-- Top bar: anon shows sign-in, auth shows room picker + list btn -->
<div class="top-bar" id="topBar">
    <a id="signInBtn" class="pill-btn" href="/login.html" style="display:none;">Sign In</a>

    <div class="room-wrap" id="roomWrap" style="display:none;">
        <select id="roomSelect"><option value="">Loading rooms…</option></select>
    </div>
    <button class="pill-btn" id="listBtn" style="display:none;" onclick="openList()">Manual Check-In</button>
</div>

<!-- Full-screen scan result overlay -->
<div id="resultOverlay" onclick="handleOverlayTap(event)">
    <div class="ro-content">
        <div class="ro-top">
            <div class="ro-icon"  id="roIcon"></div>
            <div class="ro-title" id="roTitle"></div>
            <div class="ro-name"  id="roName"></div>
            <div class="ro-sub"   id="roEmail"></div>
            <div class="ro-event" id="roEvent"></div>
            <div class="ro-fields" id="roFields"></div>
        </div>
        <div class="ro-bottom" id="roBottom"></div>
    </div>
</div>

<!-- Backdrop for list sheet only -->
<div class="backdrop" id="listBackdrop" onclick="closeList()"></div>

<!-- Manual check-in list sheet -->
<div class="sheet" id="listSheet">
    <div class="sheet-handle"></div>
    <div class="list-header">
        <div class="list-title" id="listTitle">Check-In List</div>
        <div class="search-wrap">
            <input type="search" id="searchInput" placeholder="Search attendees…" oninput="filterList()" autocomplete="off">
        </div>
    </div>
    <div class="list-stats" id="listStats"></div>
    <div id="attendeeList"></div>
    <div class="list-close">
        <button class="action-btn btn-secondary" onclick="closeList()">Done</button>
    </div>
</div>

<script>
// ── Audio ─────────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const comp = audioCtx.createDynamicsCompressor();
comp.connect(audioCtx.destination);

function playSound(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (type === 'success') {
        // C5 → A5, matching iOS timing: note at 0ms, note at 180ms
        [[523.25, 0, 0.22], [880, 180, 0.32]].forEach(([hz, ms, dur]) => setTimeout(() => {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.connect(g); g.connect(comp);
            o.type = 'sine'; o.frequency.value = hz;
            g.gain.setValueAtTime(2.5, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            o.start(); o.stop(audioCtx.currentTime + dur);
        }, ms));
    } else {
        // A3 → A#2 square, matching iOS timing: note at 0ms, note at 180ms
        [[220, 0, 0.18], [180, 180, 0.32]].forEach(([hz, ms, dur]) => setTimeout(() => {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.type = 'square'; o.frequency.value = hz;
            g.gain.setValueAtTime(0.8, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            o.start(); o.stop(audioCtx.currentTime + dur);
        }, ms));
    }
}

// ── State ─────────────────────────────────────────────────
let isLoggedIn      = false;
let isProcessing    = false;
let events          = [];
let allAttendees    = [];   // grouped registrations for selected event
let filteredAttendees = [];
let lastScannedRegistrationId = null;
let lastScannedToken  = null;
let lastScanTs        = 0;
const SCAN_DEBOUNCE_MS = 5000;
let pendingCheckoutToken = null;

// ── Init ──────────────────────────────────────────────────
(async () => {
    try {
        const r = await fetch('/api/auth/me');
        isLoggedIn = r.ok;
    } catch (_) {}

    if (isLoggedIn) {
        document.getElementById('roomWrap').style.display = 'block';
        document.getElementById('listBtn').style.display  = 'block';
        await loadEvents();
    } else {
        document.getElementById('signInBtn').style.display = 'block';
    }
    startCamera();
})();

// ── Events / rooms ────────────────────────────────────────
async function loadEvents() {
    try {
        const r = await fetch('/api/events');
        events = await r.json();
    } catch (_) { events = []; }

    const sel = document.getElementById('roomSelect');
    if (!events.length) {
        sel.innerHTML = '<option value="">No rooms</option>';
        return;
    }
    sel.innerHTML = events.map(e =>
        `<option value="${escAttr(e.id)}">${escHtml(e.name)}</option>`
    ).join('');
    sel.addEventListener('change', () => {
        allAttendees = [];
        filteredAttendees = [];
    });
}

function selectedEvent() {
    const sel = document.getElementById('roomSelect');
    return events.find(e => e.id === sel.value) || null;
}

// ── List sheet ────────────────────────────────────────────
async function openList() {
    const ev = selectedEvent();
    document.getElementById('listTitle').textContent = ev ? ev.name : 'Check-In List';
    document.getElementById('searchInput').value = '';
    document.getElementById('attendeeList').innerHTML = '<div class="list-empty">Loading…</div>';
    document.getElementById('listStats').textContent = '';

    document.getElementById('listBackdrop').classList.add('show');
    document.getElementById('listSheet').classList.add('show');

    if (ev) await loadAttendees(ev.id);
}

function closeList() {
    document.getElementById('listBackdrop').classList.remove('show');
    document.getElementById('listSheet').classList.remove('show');
}

async function openListFromResult() {
    closeResult();
    await openList();
    if (lastScannedRegistrationId) {
        setTimeout(() => {
            const el = document.getElementById(`reg-${lastScannedRegistrationId}`);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                el.style.outline = '2px solid rgba(255,255,255,0.4)';
                setTimeout(() => el.style.outline = '', 1500);
            }
        }, 400);
    }
}

async function loadAttendees(eventId) {
    try {
        const r = await fetch(`/api/event/${eventId}/tickets`);
        if (!r.ok) throw new Error();
        const tickets = await r.json();

        // Group by registrationId
        const groups = {};
        for (const t of tickets) {
            const rid = t.registrationId || t.id;
            if (!groups[rid]) groups[rid] = { registrationId: rid, name: t.name, email: t.email, tickets: [] };
            groups[rid].tickets.push(t);
        }
        allAttendees = Object.values(groups).sort((a, b) => a.name.localeCompare(b.name));
    } catch (_) {
        allAttendees = [];
    }
    filterList();
}

function filterList() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    filteredAttendees = q
        ? allAttendees.filter(a => a.name.toLowerCase().includes(q) || (a.email || '').toLowerCase().includes(q))
        : allAttendees;
    renderList();
}

function renderList() {
    const container = document.getElementById('attendeeList');
    const statsEl   = document.getElementById('listStats');

    if (!allAttendees.length) {
        container.innerHTML = '<div class="list-empty">No attendees found</div>';
        statsEl.textContent = '';
        return;
    }

    // Stats across all (not just filtered)
    const totalTickets  = allAttendees.reduce((n, a) => n + a.tickets.length, 0);
    const scannedTickets = allAttendees.reduce((n, a) => n + a.tickets.filter(t => t.used_at).length, 0);
    statsEl.textContent = `${scannedTickets} / ${totalTickets} tickets checked in`;

    if (!filteredAttendees.length) {
        container.innerHTML = '<div class="list-empty">No results</div>';
        return;
    }

    container.innerHTML = filteredAttendees.map(a => buildPersonRow(a)).join('');
}

function buildPersonRow(a) {
    const total    = a.tickets.length;
    const scanned  = a.tickets.filter(t => t.used_at).length;
    const dotClass = scanned === total ? 'dot-all' : scanned > 0 ? 'dot-partial' : 'dot-none';
    const countTxt = total === 1 ? (scanned ? '1 ticket · Checked in' : '1 ticket · Pending')
                                 : `${scanned}/${total} tickets checked in`;

    const allDone   = scanned === total;
    const checkBtnHtml = allDone
        ? ''
        : `<button class="checkin-all-btn" onclick="checkInPerson(event,'${a.registrationId}')">Check In All</button>`;

    const ticketRows = a.tickets.map((t, i) => {
        const time = t.used_at ? new Date(t.used_at).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }) : null;
        const label = total > 1 ? `Ticket ${i + 1}` : 'Ticket';
        return `
            <div class="ticket-item" id="ticket-${t.id}">
                <div class="ticket-dot ${t.used_at ? 'tdot-used' : 'tdot-pending'}"></div>
                <div class="ticket-label">${escHtml(label)}</div>
                ${time ? `<div class="ticket-time">${time}</div>` : ''}
                ${t.used_at
                    ? `<div class="ticket-scanned">✓</div>`
                    : `<button class="ticket-btn" onclick="checkInTicket(event,'${t.id}','${a.registrationId}')">Check In</button>`
                }
            </div>`;
    }).join('');

    return `
        <div class="person-row" id="reg-${a.registrationId}">
            <div class="person-main" onclick="togglePerson('${a.registrationId}')">
                <div class="person-dot ${dotClass}"></div>
                <div class="person-info">
                    <div class="person-name">${escHtml(a.name)}</div>
                    <div class="person-count">${escHtml(countTxt)}</div>
                </div>
                <div class="person-actions" onclick="event.stopPropagation()">
                    ${checkBtnHtml}
                </div>
                <div class="expand-arrow">›</div>
            </div>
            <div class="ticket-rows">${ticketRows}</div>
        </div>`;
}

function togglePerson(rid) {
    const el = document.getElementById(`reg-${rid}`);
    if (el) el.classList.toggle('open');
}

async function checkInTicket(e, ticketId, registrationId) {
    e.stopPropagation();
    const btn = e.target;
    btn.textContent = '…'; btn.disabled = true;
    try {
        const r = await fetch(`/api/checkin/${ticketId}`, { method: 'POST' });
        if (r.ok) {
            // Update local data
            const attendee = allAttendees.find(a => a.registrationId === registrationId);
            if (attendee) {
                const t = attendee.tickets.find(t => t.id === ticketId);
                if (t) t.used_at = new Date().toISOString();
            }
            playSound('success');
            filterList();
            // Re-open the person row
            setTimeout(() => {
                const row = document.getElementById(`reg-${registrationId}`);
                if (row && !row.classList.contains('open')) row.classList.add('open');
            }, 50);
        } else {
            btn.textContent = 'Check In'; btn.disabled = false;
        }
    } catch (_) { btn.textContent = 'Check In'; btn.disabled = false; }
}

async function checkInPerson(e, registrationId) {
    e.stopPropagation();
    const btn = e.target;
    btn.textContent = '…'; btn.disabled = true;
    try {
        const r = await fetch(`/api/checkin/${registrationId}`, { method: 'POST' });
        if (r.ok) {
            const now = new Date().toISOString();
            const attendee = allAttendees.find(a => a.registrationId === registrationId);
            if (attendee) attendee.tickets.forEach(t => { if (!t.used_at) t.used_at = now; });
            playSound('success');
            filterList();
        } else {
            btn.textContent = 'Check In All'; btn.disabled = false;
        }
    } catch (_) { btn.textContent = 'Check In All'; btn.disabled = false; }
}

// ── Full-screen result overlay ────────────────────────────
let resultAutoClose = null;
const RESULT_AUTO_MS = 2500;

// Colors match iOS exactly
const OVERLAY_COLORS = {
    success:       'rgba(22,163,74,0.93)',
    reentry_enter: 'rgba(22,163,74,0.93)',
    reentry_exit:  'rgba(234,88,12,0.93)',
    used:          'rgba(234,88,12,0.93)',
    invalid:       'rgba(220,38,38,0.93)',
    error:         'rgba(220,38,38,0.93)',
};
const OVERLAY_ICONS = {
    valid: '✓', reentry_enter: '↩', reentry_exit: '↩',
    used: '!', invalid: '✕', error: '✕',
};
const OVERLAY_TITLES = {
    valid: 'Checked In!', reentry_enter: 'Checked Back In!',
    reentry_exit: 'Confirm Check-Out', used: 'Already Checked In',
    invalid: 'Invalid Ticket', error: 'Error',
};

function openResult(data) {
    lastScannedRegistrationId = data.registrationId || null;

    const status = data.status || 'error';
    const isReentryExit = status === 'reentry_exit';

    const overlay = document.getElementById('resultOverlay');
    overlay.style.background = OVERLAY_COLORS[status] || OVERLAY_COLORS.error;

    document.getElementById('roIcon').textContent  = OVERLAY_ICONS[status] || '!';
    document.getElementById('roTitle').textContent = OVERLAY_TITLES[status] || 'Error';

    // Name: prefer first name like iOS
    const displayName = data.firstName || data.name || '';
    document.getElementById('roName').textContent = displayName;

    const emailEl = document.getElementById('roEmail');
    emailEl.textContent = data.email || '';
    emailEl.style.display = data.email ? '' : 'none';

    const eventEl = document.getElementById('roEvent');
    eventEl.textContent = data.eventName || '';
    eventEl.style.display = data.eventName ? '' : 'none';

    // Custom fields (matching iOS card style)
    const cf = data.customFields || {};
    const cfEntries = Object.entries(cf).filter(([, v]) => v !== '' && v != null);
    document.getElementById('roFields').innerHTML = cfEntries.map(([label, value]) => `
        <div class="ro-field">
            <span class="ro-field-label">${escHtml(label)}</span>
            <span class="ro-field-value">${escHtml(String(value))}</span>
        </div>`).join('');

    // Bottom action area
    const bottom = document.getElementById('roBottom');
    if (isReentryExit) {
        pendingCheckoutToken = data._token || null;
        const btnColor = OVERLAY_COLORS.reentry_exit.replace('0.93', '1');
        bottom.innerHTML = `
            <button class="ro-confirm-btn" id="roConfirmBtn" onclick="confirmCheckout()" style="color:rgba(180,60,0,1);">Confirm Check-Out</button>
            <button class="ro-cancel-btn" onclick="closeResult()">Cancel</button>`;
    } else {
        pendingCheckoutToken = null;
        const listBtn = (isLoggedIn && selectedEvent())
            ? `<button class="ro-pill-btn" onclick="openListFromResult()">View in List</button>` : '';
        bottom.innerHTML = listBtn + `<div class="ro-hint">Tap anywhere to continue</div>`;
    }

    overlay.classList.add('show');

    // Auto-dismiss at 2.5s matching iOS — skip for exit confirmation
    clearTimeout(resultAutoClose);
    if (!isReentryExit) {
        resultAutoClose = setTimeout(closeResult, RESULT_AUTO_MS);
    }
}

function closeResult() {
    clearTimeout(resultAutoClose);
    document.getElementById('resultOverlay').classList.remove('show');
    pendingCheckoutToken = null;
    setTimeout(() => { isProcessing = false; }, 250);
}

function handleOverlayTap(e) {
    if (e.target.tagName === 'BUTTON') return;
    if (pendingCheckoutToken) return; // exit confirmation active — require explicit button tap
    closeResult();
}

async function confirmCheckout() {
    if (!pendingCheckoutToken) { closeResult(); return; }
    const btn = document.getElementById('roConfirmBtn');
    if (btn) { btn.textContent = 'Checking out…'; btn.disabled = true; }
    try {
        await fetch('/api/checkout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: pendingCheckoutToken })
        });
        playSound('success');
    } catch (_) {}
    closeResult();
}

// ── Scan handler ──────────────────────────────────────────
function onScanSuccess(decodedText) {
    if (isProcessing) return;

    if (!decodedText.startsWith('ticket:')) {
        if (Date.now() - lastScanTs > SCAN_DEBOUNCE_MS) {
            isProcessing = true;
            playSound('error');
            openResult({ status: 'invalid', name: 'Invalid QR Code' });
        }
        return;
    }

    const token = decodedText.split(':')[1].trim();
    const now = Date.now();

    // 5-second same-token debounce
    if (token === lastScannedToken && (now - lastScanTs) < SCAN_DEBOUNCE_MS) return;

    isProcessing = true;
    lastScannedToken = token;
    lastScanTs = now;

    fetch('/api/validate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token })
    })
    .then(r => r.json())
    .then(data => {
        data._token = token;
        const isSuccess = data.status === 'valid' || data.status === 'reentry_enter';
        playSound(isSuccess ? 'success' : 'error');
        openResult(data);
    })
    .catch(() => {
        playSound('error');
        openResult({ status: 'error', name: 'Server Error' });
    });
}

// ── Camera ────────────────────────────────────────────────
const scanner = new Html5Qrcode('reader');
scanner.start(
    { facingMode: 'environment' },
    { fps: 15 },
    onScanSuccess
).then(() => {
    const video = document.querySelector('#reader video');
    if (video) Object.assign(video.style, {
        position: 'absolute', inset: '0',
        width: '100%', height: '100%', objectFit: 'cover'
    });
    const region = document.getElementById('reader__scan_region');
    if (region) Object.assign(region.style, {
        position: 'absolute', inset: '0', width: '100%', height: '100%'
    });
}).catch(err => console.error('Camera error:', err));

// ── Utilities ─────────────────────────────────────────────
function escHtml(s)  { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s)  { return String(s ?? '').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
</script>
</body>
