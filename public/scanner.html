<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner | TicketCheckin</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body style="background:#000;">
    <div class="container" style="margin:0; padding:0; max-width:none;">
        <div id="reader" style="height:100vh;"></div>

        <a id="dashboardBtn" href="/dashboard.html" style="position:fixed;top:16px;right:16px;z-index:100;background:rgba(0,0,0,0.6);color:#fff;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;text-decoration:none;backdrop-filter:blur(6px);display:none;"></a>

        <div id="statusOverlay" class="status-overlay">
            <div class="status-icon" id="statusIcon">✓</div>
            <div class="status-msg" id="statusMsg">Valid Ticket</div>
            <div class="status-sub" id="statusSub">Name Surname</div>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const compressor = audioCtx.createDynamicsCompressor();
        compressor.connect(audioCtx.destination);

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (type === 'success') {
                const osc1 = audioCtx.createOscillator(), gain1 = audioCtx.createGain();
                osc1.connect(gain1); gain1.connect(compressor);
                osc1.type = 'sine'; osc1.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                gain1.gain.setValueAtTime(3.0, audioCtx.currentTime);
                gain1.gain.linearRampToValueAtTime(3.0, audioCtx.currentTime + 0.15);
                gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc1.start(); osc1.stop(audioCtx.currentTime + 0.4);
                setTimeout(() => {
                    const osc2 = audioCtx.createOscillator(), gain2 = audioCtx.createGain();
                    osc2.connect(gain2); gain2.connect(compressor);
                    osc2.type = 'sine'; osc2.frequency.setValueAtTime(880, audioCtx.currentTime);
                    gain2.gain.setValueAtTime(3.0, audioCtx.currentTime);
                    gain2.gain.linearRampToValueAtTime(3.0, audioCtx.currentTime + 0.2);
                    gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
                    osc2.start(); osc2.stop(audioCtx.currentTime + 0.6);
                }, 150);
            } else {
                const osc1 = audioCtx.createOscillator(), gain1 = audioCtx.createGain();
                osc1.connect(gain1); gain1.connect(audioCtx.destination);
                osc1.type = 'square'; osc1.frequency.setValueAtTime(220, audioCtx.currentTime);
                gain1.gain.setValueAtTime(1.0, audioCtx.currentTime);
                gain1.gain.linearRampToValueAtTime(1.0, audioCtx.currentTime + 0.2);
                gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc1.start(); osc1.stop(audioCtx.currentTime + 0.3);
                setTimeout(() => {
                    const osc2 = audioCtx.createOscillator(), gain2 = audioCtx.createGain();
                    osc2.connect(gain2); gain2.connect(audioCtx.destination);
                    osc2.type = 'square'; osc2.frequency.setValueAtTime(180, audioCtx.currentTime);
                    gain2.gain.setValueAtTime(1.0, audioCtx.currentTime);
                    gain2.gain.linearRampToValueAtTime(1.0, audioCtx.currentTime + 0.3);
                    gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                    osc2.start(); osc2.stop(audioCtx.currentTime + 0.4);
                }, 150);
            }
        }

        let isProcessing = false;
        const overlay    = document.getElementById('statusOverlay');
        const statusIcon = document.getElementById('statusIcon');
        const statusMsg  = document.getElementById('statusMsg');
        const statusSub  = document.getElementById('statusSub');

        function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;

            if (!decodedText.startsWith('ticket:')) {
                showStatus('error', 'Invalid Format', 'Not a valid ticket QR code');
                return;
            }

            const token = decodedText.split(':')[1];

            fetch('/api/validate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'valid') {
                    showStatus('success', 'Valid Ticket', data.name);
                } else if (data.status === 'used') {
                    showStatus('error', 'Already Used', `${data.name} — scanned at ${new Date(data.used_at).toLocaleTimeString()}`);
                } else {
                    showStatus('error', 'Invalid Ticket', data.message || 'Ticket not found');
                }
            })
            .catch(() => showStatus('error', 'System Error', 'Could not connect to server'));
        }

        function showStatus(type, title, subtitle) {
            isProcessing = true;
            playSound(type);
            overlay.className = `status-overlay active ${type}`;
            overlay.style.backgroundColor = type === 'success' ? 'var(--success)' : 'var(--danger)';
            overlay.style.color = 'white';
            statusIcon.textContent = type === 'success' ? '✓' : '✕';
            statusMsg.textContent  = title;
            statusSub.textContent  = subtitle;
            setTimeout(() => {
                overlay.classList.remove('active');
                overlay.style.backgroundColor = '';
                overlay.style.color = '';
                setTimeout(() => { isProcessing = false; }, 1000);
            }, 2000);
        }

        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, aspectRatio: 1.0 }, onScanSuccess);

        const dashboardBtn = document.getElementById('dashboardBtn');
        fetch('/api/auth/me').then(r => {
            dashboardBtn.style.display = 'block';
            if (r.ok) {
                dashboardBtn.textContent = 'Manual Check-In';
            } else {
                dashboardBtn.textContent = 'Sign In';
            }
        }).catch(() => {
            dashboardBtn.textContent = 'Sign In';
            dashboardBtn.style.display = 'block';
        });
    </script>
</body>
</html>
