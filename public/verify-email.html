<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email | WTS Tickets</title>
    <meta name="theme-color" content="#1a1f3c">
    <link rel="stylesheet" href="style.css">
    <style>
        body { justify-content: flex-start; background: #f4f5f8; }
        .page-nav {
            background: #1a1f3c;
            padding: 0 20px; height: 52px;
            display: flex; align-items: center;
        }
        .page-nav img { height: 24px; width: auto; }
        .auth-wrap {
            flex: 1; display: flex;
            align-items: flex-start; justify-content: center;
            padding: 40px 16px;
        }
        .auth-card {
            background: #fff;
            border: 1px solid #dde3ed;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,.07);
            padding: 40px 32px;
            width: 100%; max-width: 400px;
            text-align: center;
        }
        .icon { font-size: 52px; margin-bottom: 18px; }
        .card-title { font-size: 22px; font-weight: 800; color: #1a1f3c; margin-bottom: 10px; }
        .card-desc  { font-size: 15px; color: #64748b; line-height: 1.6; margin-bottom: 28px; }
        .btn-primary {
            display: inline-block; background: #1a1f3c; color: #fff;
            text-decoration: none; font-size: 15px; font-weight: 700;
            padding: 13px 32px; border-radius: 10px; width: 100%;
            box-sizing: border-box; border: none; cursor: pointer;
        }
        .btn-primary:hover { background: #2d3561; }
        .spinner {
            width: 36px; height: 36px; border: 3px solid #e2e8f0;
            border-top-color: #1a1f3c; border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <nav class="page-nav">
        <a href="/"><img src="/logo-nav.svg" alt="Will's Tech Support"></a>
    </nav>
    <div class="auth-wrap">
        <div class="auth-card" id="card">
            <div class="spinner" id="spinner"></div>
            <div class="card-title">Verifying your email…</div>
            <div class="card-desc">Just a moment.</div>
        </div>
    </div>

    <script>
        const token = new URLSearchParams(window.location.search).get('token');
        const card  = document.getElementById('card');

        async function verify() {
            if (!token) {
                showError('Invalid link', 'This verification link is missing a token. Please check your email and try again.');
                return;
            }
            try {
                const r    = await fetch(`/api/auth/verify/${encodeURIComponent(token)}`);
                const data = await r.json();
                if (data.success) {
                    card.innerHTML = `
                        <div class="icon">✅</div>
                        <div class="card-title">Email verified!</div>
                        <div class="card-desc">Your account is active. Taking you to the dashboard…</div>
                        <a href="/dashboard.html" class="btn-primary">Go to Dashboard</a>`;
                    setTimeout(() => window.location.href = '/dashboard.html', 2000);
                } else {
                    showError('Link expired or invalid', data.error || 'This verification link has already been used or has expired.');
                }
            } catch {
                showError('Connection error', 'Could not reach the server. Please try again.');
            }
        }

        function showError(title, desc) {
            card.innerHTML = `
                <div class="icon">⚠️</div>
                <div class="card-title">${title}</div>
                <div class="card-desc">${desc}</div>
                <a href="/login.html" class="btn-primary">Back to Login</a>`;
        }

        verify();
    </script>
</body>
</html>
