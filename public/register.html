<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | TicketCheckin</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1 id="eventTitle">TicketCheckin</h1>
                <p id="eventDesc">Register for the event and get your unique ticket.</p>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="john@example.com" required>
                </div>
                <button type="submit" id="submitBtn">Generate Ticket</button>
            </form>

            <div id="result" class="qr-result" style="display: none;">
                <h3 style="margin-bottom: 12px;">You're In! 🎉</h3>
                <p style="margin-bottom: 20px; font-size: 14px; color: var(--text-muted);">
                    An email has been sent to you. You can also save this QR code:
                </p>
                <img id="qrImage" src="" alt="QR Code">
                <p style="margin-top: 12px; font-weight: 700;" id="ticketName"></p>

                <div style="text-align: center; margin-top: 20px;">
                    <a id="appleWalletLink" href="#" style="display: inline-block;">
                        <img src="/apple-wallet-badge.png" alt="Add to Apple Wallet"
                            style="height: 40px; border: none; box-shadow: none;">
                    </a>
                </div>

                <button onclick="window.location.reload()"
                    style="margin-top: 24px; background: #eee; color: #333;">Register Another</button>
            </div>
        </div>

        <div class="nav">
            <a href="scanner.html">Go to Scanner →</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');
        const result = document.getElementById('result');
        const qrImage = document.getElementById('qrImage');
        const ticketName = document.getElementById('ticketName');
        const eventTitle = document.getElementById('eventTitle');
        const eventDesc = document.getElementById('eventDesc');

        // Detect event ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('id');

        if (!eventId) {
            alert('No Event ID provided. Redirecting to home.');
            window.location.href = '/';
        }

        // Load Event Info
        async function loadEvent() {
            try {
                const res = await fetch(`/api/event/${eventId}`);
                if (!res.ok) throw new Error('Event not found');
                const event = await res.json();
                eventTitle.textContent = event.name;
                eventDesc.textContent = `Register for ${event.location.name} on ${new Date(event.time).toLocaleString()}`;
                document.title = `${event.name} - Registration`;
            } catch (err) {
                console.error('Error loading event:', err);
                alert('Event not found or has been removed.');
                window.location.href = '/';
            }
        }
        loadEvent();

        form.onsubmit = async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';

            const payload = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                eventId: eventId
            };

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                if (data.success) {
                    form.style.display = 'none';
                    result.style.display = 'block';
                    qrImage.src = data.qr;
                    ticketName.textContent = data.ticket.name;
                    document.getElementById('appleWalletLink').href = `/api/pass/${data.ticket.token}.pkpass`;
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (err) {
                alert('Connection error. Please try again.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Generate Ticket';
            }
        };
    </script>
</body>

</html>
