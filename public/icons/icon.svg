<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#1a1f3c"/>

  <!-- Ticket body -->
  <rect x="88" y="152" width="336" height="208" rx="30" fill="rgba(255,255,255,0.92)"/>

  <!-- Side notches (cut-out semicircles) -->
  <circle cx="88"  cy="256" r="24" fill="#1a1f3c"/>
  <circle cx="424" cy="256" r="24" fill="#1a1f3c"/>

  <!-- Perforation dashes -->
  <line x1="256" y1="172" x2="256" y2="340"
        stroke="#1a1f3c" stroke-width="5"
        stroke-dasharray="14,11" stroke-linecap="round" opacity="0.25"/>
</svg>
