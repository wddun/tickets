<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#252b52"/>
      <stop offset="100%" style="stop-color:#1a1f3c"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Red accent stripe top -->
  <rect x="0" y="0" width="512" height="18" rx="112" fill="#c4294a"/>
  <rect x="0" y="0" width="512" height="18" fill="#c4294a"/>
  <!-- Ticket body -->
  <rect x="80" y="140" width="352" height="232" rx="24" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="3"/>
  <!-- Perforation line -->
  <line x1="80" y1="290" x2="432" y2="290" stroke="rgba(255,255,255,0.2)" stroke-width="3" stroke-dasharray="12,9"/>
  <!-- Ticket icon -->
  <text x="256" y="230" font-family="-apple-system,sans-serif" font-size="96"
        text-anchor="middle" dominant-baseline="middle">🎟</text>
  <!-- WTS text below -->
  <text x="256" y="340" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="36" font-weight="800" fill="rgba(255,255,255,0.7)"
        text-anchor="middle" dominant-baseline="middle" letter-spacing="4">TICKETS</text>
</svg>
