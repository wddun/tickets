<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Monitor | WTS Tickets</title>
    <meta name="theme-color" content="#1a1f3c">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f4f5f7;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Top bar ── */
        .topbar {
            background: #1a1f3c;
            padding: 0 20px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
            flex-shrink: 0;
            gap: 12px;
        }

        .topbar-logo img {
            height: 26px;
            display: block;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .topbar-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: rgba(255, 255, 255, 0.75);
            padding: 7px 13px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
            font-family: inherit;
        }

        .topbar-btn:hover {
            background: rgba(255, 255, 255, 0.14);
            color: #fff;
        }

        .topbar-btn-primary {
            background: rgba(99, 102, 241, 0.35);
            color: #c7d2fe;
        }

        .topbar-btn-primary:hover {
            background: rgba(99, 102, 241, 0.55);
            color: #fff;
        }

        /* ── Page layout ── */
        .page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px;
            flex: 1;
            width: 100%;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .page-title {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .page-sub {
            font-size: 14px;
            color: #888;
            margin-top: 2px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            color: #059669;
            background: #d1fae5;
            border-radius: 20px;
            padding: 4px 10px;
        }

        .live-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* ── Buttons ── */
        .btn {
            padding: 9px 18px;
            border-radius: 9px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: opacity 0.15s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn-primary {
            background: #1a1f3c;
            color: #fff;
        }

        .btn-secondary {
            background: #e8eaf0;
            color: #1a1a2e;
        }

        .btn-danger {
            background: #fee2e2;
            color: #dc2626;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        /* ── Event filter tabs ── */
        .event-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .event-tab {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid transparent;
            background: #fff;
            color: #888;
            transition: all 0.15s;
        }

        .event-tab:hover {
            border-color: #dde3ed;
            color: #333;
        }

        .event-tab.active {
            background: #1a1f3c;
            color: #fff;
            border-color: #1a1f3c;
        }

        /* ── Scanner grid ── */
        .scanner-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }

        .scanner-card {
            background: #fff;
            border: 1.5px solid #e8e8e8;
            border-radius: 14px;
            overflow: hidden;
            transition: box-shadow 0.15s, border-color 0.15s;
        }

        .scanner-card:hover {
            box-shadow: 0 4px 16px rgba(26, 31, 60, 0.1);
        }

        .scanner-card.status-online {
            border-color: #6ee7b7;
        }

        .scanner-card.status-idle {
            border-color: #fde68a;
        }

        .scanner-card.status-offline {
            border-color: #fecaca;
            opacity: 0.7;
        }

        .scanner-header {
            padding: 16px 18px 12px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .scanner-status-dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .dot-online {
            background: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }

        .dot-idle {
            background: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15);
        }

        .dot-offline {
            background: #ef4444;
        }

        .scanner-info {
            flex: 1;
            min-width: 0;
        }

        .scanner-name {
            font-size: 15px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
        }

        .scanner-meta {
            font-size: 12px;
            color: #888;
        }

        .platform-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 12px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .badge-ios {
            background: #ede9fe;
            color: #6d28d9;
        }

        .badge-web {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .badge-unknown {
            background: #f4f5f7;
            color: #888;
        }

        .scanner-body {
            padding: 0 18px 16px;
        }

        .scan-result-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: #f8f9fc;
            border-radius: 10px;
            margin-bottom: 12px;
            min-height: 42px;
        }

        .scan-result-pill {
            font-size: 11px;
            font-weight: 700;
            padding: 2px 9px;
            border-radius: 20px;
            flex-shrink: 0;
        }

        .pill-valid {
            background: #d1fae5;
            color: #059669;
        }

        .pill-used {
            background: #fef3c7;
            color: #b45309;
        }

        .pill-invalid {
            background: #fee2e2;
            color: #dc2626;
        }

        .pill-reentry {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .pill-idle {
            background: #f4f5f7;
            color: #aaa;
        }

        .scan-result-name {
            font-size: 13px;
            font-weight: 600;
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .scan-result-event {
            font-size: 12px;
            color: #aaa;
        }

        .scanner-footer {
            display: flex;
            align-items: center;
            gap: 8px;
            border-top: 1px solid #f4f5f7;
            padding-top: 12px;
            flex-wrap: wrap;
        }

        .last-seen {
            font-size: 11px;
            color: #bbb;
            flex: 1;
            min-width: 0;
        }

        /* ── Details drawer ── */
        .details-drawer {
            display: none;
            background: #f8f9fc;
            border-top: 1px solid #e8eef6;
            padding: 14px 18px;
            font-size: 12px;
        }

        .details-drawer.open {
            display: block;
        }

        .details-row {
            display: flex;
            gap: 8px;
            padding: 4px 0;
            border-bottom: 1px solid #eee;
            line-height: 1.5;
        }

        .details-row:last-child {
            border-bottom: none;
        }

        .details-label {
            color: #999;
            font-weight: 600;
            width: 100px;
            flex-shrink: 0;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            font-size: 11px;
            padding-top: 1px;
        }

        .details-value {
            color: #333;
            word-break: break-all;
        }

        /* ── Notify form ── */
        .notify-form {
            display: none;
            padding: 14px 18px;
            border-top: 1px solid #e8eef6;
            background: #fff;
            gap: 8px;
        }

        .notify-form.open {
            display: flex;
            flex-direction: column;
        }

        .notify-input {
            width: 100%;
            padding: 9px 11px;
            border: 1px solid #dde3ed;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            font-family: inherit;
            resize: none;
        }

        .notify-input:focus {
            border-color: #6366f1;
        }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            padding: 80px 32px;
            color: #bbb;
            grid-column: 1/-1;
        }

        .empty-state svg {
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .empty-state h3 {
            font-size: 17px;
            color: #999;
            margin-bottom: 6px;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* ── Notify All modal ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: #fff;
            border-radius: 16px;
            padding: 28px;
            max-width: 440px;
            width: 92%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.15);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }

        .modal-header h2 {
            font-size: 17px;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: #999;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .err-msg {
            color: #dc2626;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="topbar">
        <a href="/" class="topbar-logo"><img src="/logo-nav.svg" alt="WTS Tickets"></a>
        <div class="topbar-actions">
            <a href="/dashboard.html" class="topbar-btn">← Dashboard</a>
            <a href="/scanner.html" class="topbar-btn">Web Scanner</a>
            <button class="topbar-btn" onclick="logout()">Sign Out</button>
        </div>
    </div>

    <div class="page">
        <div class="page-header">
            <div>
                <div class="page-title">Scanner Monitor</div>
                <div class="page-sub">Live view of all connected scanner devices</div>
            </div>
            <div class="header-actions">
                <span class="live-badge"><span class="live-dot"></span> Live</span>
                <button class="btn btn-secondary" onclick="refreshScanners()">↺ Refresh</button>
                <button class="btn btn-primary" id="notifyAllBtn" onclick="openNotifyAll()" style="display:none">📢
                    Notify All</button>
            </div>
        </div>

        <!-- Event filter tabs -->
        <div class="event-tabs" id="eventTabs">
            <div class="event-tab active" data-event-id="all" onclick="filterByEvent('all', this)">All Events</div>
        </div>

        <!-- Scanner grid -->
        <div class="scanner-grid" id="scannerGrid">
            <div class="empty-state">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2" />
                    <path d="M8 21h8M12 17v4" />
                </svg>
                <h3>No scanners yet</h3>
                <p>Open the iOS app or web scanner to see devices here</p>
            </div>
        </div>
    </div>

    <!-- Notify All modal -->
    <div class="modal-overlay" id="notifyAllModal" onclick="if(event.target===this)closeNotifyAll()">
        <div class="modal">
            <div class="modal-header">
                <h2>📢 Notify All Scanners</h2>
                <button class="modal-close" onclick="closeNotifyAll()">×</button>
            </div>
            <div class="form-group">
                <label>Title (optional)</label>
                <input type="text" id="notifyAllTitle" class="notify-input" placeholder="Admin Message"
                    style="height:auto;resize:none;">
            </div>
            <div class="form-group">
                <label>Message *</label>
                <textarea id="notifyAllMsg" class="notify-input" rows="3" placeholder="Type your message…"></textarea>
            </div>
            <div class="err-msg" id="notifyAllErr"></div>
            <div style="display:flex;gap:8px;margin-top:6px;">
                <button class="btn btn-primary" style="flex:1" id="notifyAllSubmit" onclick="submitNotifyAll()">Send to
                    All</button>
                <button class="btn btn-secondary" onclick="closeNotifyAll()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // ── State ──────────────────────────────────────────────────────────
        let scanners = new Map();   // pairToken → scanner object
        let events = new Map();   // eventId → event object
        let activeEventFilter = 'all';
        let monitorStream = null;

        // ── Bootstrap ──────────────────────────────────────────────────────
        async function init() {
            try {
                await refreshScanners();
                startSSE();
            } catch (err) {
                if (err.status === 401) location.href = '/login.html';
            }
        }

        async function refreshScanners() {
            const r = await fetch('/api/monitor/scanners');
            if (r.status === 401) { location.href = '/login.html'; return; }
            const data = await r.json();

            // Seed events map
            for (const ev of (data.events || [])) {
                events.set(ev.id, ev);
            }
            rebuildEventTabs();

            // Seed scanners (merge with live registry from server)
            for (const s of (data.scanners || [])) {
                scanners.set(s.pairToken, s);
            }

            renderGrid();
            document.getElementById('notifyAllBtn').style.display = scanners.size > 0 ? '' : 'none';
        }

        // ── SSE live updates ───────────────────────────────────────────────
        function startSSE() {
            if (monitorStream) monitorStream.close();
            monitorStream = new EventSource('/api/monitor/stream');
            monitorStream.onmessage = (e) => {
                let msg;
                try { msg = JSON.parse(e.data); } catch { return; }

                if (msg.type === 'ticket_scan') {
                    const card = document.getElementById(`card-${msg.pairToken}`);
                    if (card) {
                        // Update name + pill immediately without waiting for scanner_update
                        const nameEl = card.querySelector('.scan-result-name');
                        const pillEl = card.querySelector('.scan-result-pill');
                        const cntEl  = card.querySelector('.scan-result-event');
                        if (nameEl && msg.name) nameEl.textContent = msg.name;
                        if (cntEl && msg.total !== undefined) cntEl.textContent = `${msg.scanned}/${msg.total}`;
                        if (pillEl) {
                            const pillMap = {
                                valid: ['pill-valid', '✓ Check In'],
                                reentry_enter: ['pill-reentry', '↩ Re-Entry'],
                                checked_out: ['pill-valid', '↪ Checked Out'],
                                used: ['pill-used', 'Already Used'],
                                invalid: ['pill-invalid', '✗ Invalid'],
                            };
                            const [cls, lbl] = pillMap[msg.status] || ['pill-idle', msg.status];
                            pillEl.className = `scan-result-pill ${cls}`;
                            pillEl.textContent = lbl;
                        }
                        flashCard(card, msg.status);
                    }
                }

                if (msg.type === 'scanner_update') {
                    const prev = scanners.get(msg.scanner.pairToken);
                    scanners.set(msg.scanner.pairToken, msg.scanner);
                    document.getElementById('notifyAllBtn').style.display = '';

                    const existingCard = document.getElementById(`card-${msg.scanner.pairToken}`);
                    if (existingCard) {
                        // Scanner moved to a different event — remove its card from this view
                        if (activeEventFilter !== 'all' && msg.scanner.eventId !== activeEventFilter) {
                            existingCard.remove();
                        } else {
                            // Surgical update — leave any open notify/details forms untouched
                            updateCardSurgically(existingCard, msg.scanner);
                        }
                    } else {
                        // New scanner appeared — full rebuild
                        renderGrid();
                    }

                    // Flash on new scan result
                    if (msg.scanner.lastResult && (!prev || JSON.stringify(prev.lastResult) !== JSON.stringify(msg.scanner.lastResult))) {
                        const card = document.getElementById(`card-${msg.scanner.pairToken}`);
                        if (card && !card._flashing) flashCard(card, msg.scanner.lastResult.status);
                    }
                }
            };
            monitorStream.onerror = () => {
                setTimeout(startSSE, 5000);
            };
        }

        function flashCard(card, status) {
            let bg, border;
            if (status === 'valid' || status === 'reentry_enter') {
                bg = '#16a34a'; border = '#15803d';       // solid green
            } else if (status === 'checked_out') {
                bg = '#2563eb'; border = '#1d4ed8';       // solid blue
            } else if (status === 'used' || status === 'reentry_exit') {
                bg = '#d97706'; border = '#b45309';       // solid amber
            } else {
                bg = '#dc2626'; border = '#b91c1c';       // solid red
            }

            card._flashing = true;
            card.style.transition = 'none';
            card.style.backgroundColor = bg;
            card.style.borderColor = border;
            card.style.color = '#fff';

            // Hold the color for 1.8s then fade back
            setTimeout(() => {
                card.style.transition = 'background-color 1s ease-out, border-color 1s ease-out, color 0.5s ease-out';
                card.style.backgroundColor = '#fff';
                card.style.color = '';
                // Restore border to its status class color after fade
                const statusClass = [...card.classList].find(c => c.startsWith('status-'));
                const borderMap = { 'status-online': '#6ee7b7', 'status-idle': '#fde68a', 'status-offline': '#fecaca' };
                card.style.borderColor = borderMap[statusClass] || '#e8e8e8';
                setTimeout(() => { card._flashing = false; }, 1000);
            }, 1800);
        }

        function updateCardSurgically(card, s) {
            const status = onlineStatus(s);
            // Update card border class
            card.className = `scanner-card status-${status}`;
            if (card._flashing) {
                // Keep flash colors while animating
                card.className = `scanner-card status-${status}`;
            }

            // Status dot
            const dot = card.querySelector('.scanner-status-dot');
            if (dot) dot.className = `scanner-status-dot dot-${status}`;

            // Last seen
            const lastSeenEl = card.querySelector('.last-seen');
            if (lastSeenEl) lastSeenEl.textContent = s.online ? 'Connected' : `Last seen ${timeAgo(s.lastSeen, false)}`;

            // Scan result pill + name
            const lastR = s.lastResult;
            const pillEl = card.querySelector('.scan-result-pill');
            const nameEl = card.querySelector('.scan-result-name');
            const cntEl  = card.querySelector('.scan-result-event');
            if (pillEl && lastR) {
                const statusMap = {
                    valid: ['pill-valid', '✓ Valid'],
                    used: ['pill-used', 'Already Used'],
                    invalid: ['pill-invalid', '✗ Invalid'],
                    reentry_enter: ['pill-reentry', 'Re-Entry'],
                    reentry_exit: ['pill-reentry', 'Check-Out'],
                    checked_out: ['pill-valid', '↪ Checked Out'],
                };
                const [cls, lbl] = statusMap[lastR.status] || ['pill-idle', 'Idle'];
                pillEl.className = `scan-result-pill ${cls}`;
                pillEl.textContent = lbl;
            }
            if (nameEl && lastR) nameEl.textContent = lastR.name || '';
            if (cntEl  && lastR && lastR.total !== undefined) cntEl.textContent = `${lastR.scanned}/${lastR.total}`;

            // Event meta
            const metaEl = card.querySelector('.scanner-meta');
            if (metaEl) metaEl.textContent = s.eventName || (s.eventId ? 'Unknown event' : 'No event');
        }

        // ── Event tabs ─────────────────────────────────────────────────────
        function rebuildEventTabs() {
            const tabs = document.getElementById('eventTabs');
            // Keep only the "All" tab + rebuild event tabs
            tabs.innerHTML = `<div class="event-tab ${activeEventFilter === 'all' ? 'active' : ''}" data-event-id="all" onclick="filterByEvent('all',this)">All Events</div>`;
            for (const [id, ev] of events) {
                const active = activeEventFilter === id ? 'active' : '';
                tabs.innerHTML += `<div class="event-tab ${active}" data-event-id="${id}" onclick="filterByEvent('${id}',this)">${esc(ev.name)}</div>`;
            }
        }

        function filterByEvent(eventId, el) {
            activeEventFilter = eventId;
            document.querySelectorAll('.event-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderGrid();
        }

        // ── Render ─────────────────────────────────────────────────────────
        function renderGrid() {
            const grid = document.getElementById('scannerGrid');
            const filtered = [...scanners.values()].filter(s =>
                activeEventFilter === 'all' || s.eventId === activeEventFilter
            );

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
            <h3>No scanners ${activeEventFilter === 'all' ? 'connected' : 'for this event'}</h3>
            <p>Open the iOS app or web scanner to see devices here</p>
        </div>`;
                return;
            }

            // Sort: online first, then idle, then offline; within each group by lastSeen desc
            filtered.sort((a, b) => {
                const oa = onlineStatus(a), ob = onlineStatus(b);
                const order = { online: 0, idle: 1, offline: 2 };
                if (order[oa] !== order[ob]) return order[oa] - order[ob];
                return new Date(b.lastSeen || 0) - new Date(a.lastSeen || 0);
            });

            grid.innerHTML = filtered.map(s => scannerCardHTML(s)).join('');
        }

        function onlineStatus(s) {
            if (s.online) return 'online';
            if (!s.lastSeen) return 'offline';
            const age = (Date.now() - new Date(s.lastSeen)) / 1000;
            if (age < 300) return 'idle';
            return 'offline';
        }

        function scannerCardHTML(s) {
            const status = onlineStatus(s);
            const dotClass = `dot-${status}`;
            const lastR = s.lastResult;

            // Platform badge
            const platform = (s.platform || '').toLowerCase();
            let badgeClass = 'badge-unknown', badgeLabel = 'Unknown';
            if (platform.includes('ios')) { badgeClass = 'badge-ios'; badgeLabel = '📱 iOS App'; }
            else if (platform.includes('web')) { badgeClass = 'badge-web'; badgeLabel = '🌐 Web'; }

            // Last scan result pill
            let pillClass = 'pill-idle', pillLabel = 'Idle';
            if (lastR) {
                const statusMap = {
                    valid: ['pill-valid', '✓ Valid'],
                    used: ['pill-used', 'Already Used'],
                    invalid: ['pill-invalid', '✗ Invalid'],
                    reentry_enter: ['pill-reentry', 'Re-Entry'],
                    reentry_exit: ['pill-reentry', 'Check-Out'],
                };
                const mapped = statusMap[lastR.status];
                if (mapped) { [pillClass, pillLabel] = mapped; }
            }

            const lastSeenLabel = s.online ? 'Connected' : (s.lastSeen ? timeAgo(s.lastSeen, false) : 'Never');
            const eventName = s.eventName || (s.eventId ? 'Unknown event' : 'No event');

            return `<div class="scanner-card status-${status}" id="card-${s.pairToken}">
        <div class="scanner-header">
            <div class="scanner-status-dot ${dotClass}"></div>
            <div class="scanner-info">
                <div class="scanner-name">${esc(s.deviceName || 'Unknown Device')}</div>
                <div class="scanner-meta">${esc(eventName)}</div>
            </div>
            <span class="platform-badge ${badgeClass}">${badgeLabel}</span>
        </div>
        <div class="scanner-body">
            <div class="scan-result-row">
                <span class="scan-result-pill ${pillClass}">${pillLabel}</span>
                ${lastR && lastR.name
                    ? `<span class="scan-result-name">${esc(lastR.name)}</span>`
                    : `<span class="scan-result-name" style="color:#bbb">No scans yet</span>`}
                ${lastR && lastR.total !== undefined
                    ? `<span class="scan-result-event">${lastR.scanned}/${lastR.total}</span>`
                    : ''}
            </div>
            <div class="scanner-footer">
                <span class="last-seen">Last seen ${lastSeenLabel}</span>
                <button class="btn btn-secondary btn-sm" onclick="toggleDetails('${s.pairToken}')">Details</button>
                <button class="btn btn-primary btn-sm" onclick="toggleNotify('${s.pairToken}')">💬 Notify</button>
            </div>
        </div>
        <div class="details-drawer" id="details-${s.pairToken}">
            ${detailsHTML(s)}
        </div>
        <div class="notify-form" id="notify-${s.pairToken}">
            <input type="text" class="notify-input" placeholder="Title (optional)" id="ntitle-${s.pairToken}" style="height:auto;">
            <textarea class="notify-input" rows="2" placeholder="Message…" id="nmsg-${s.pairToken}"></textarea>
            <div class="notify-err" style="display:none;color:#ef4444;font-size:12px;margin-top:4px;"></div>
            <div style="display:flex;gap:8px;">
                <button class="btn btn-primary btn-sm" onclick="sendNotify('${s.pairToken}')">Send</button>
                <button class="btn btn-secondary btn-sm" onclick="toggleNotify('${s.pairToken}')">Cancel</button>
            </div>
        </div>
    </div>`;
        }

        function detailsHTML(s) {
            const rows = [
                ['IP', s.ip || '—'],
                ['Platform', s.platform || '—'],
                ['OS', s.osVersion || '—'],
                ['App', s.appVersion ? `v${s.appVersion}` : '—'],
                ['Device', s.deviceName || '—'],
                ['Token', s.pairToken || '—'],
                ['Last seen', s.lastSeen ? new Date(s.lastSeen).toLocaleString() : '—'],
                ['User-Agent', s.userAgent || '—'],
            ];
            return rows.map(([l, v]) =>
                `<div class="details-row"><span class="details-label">${l}</span><span class="details-value">${esc(String(v))}</span></div>`
            ).join('');
        }

        // ── Interactions ──────────────────────────────────────────────────
        function toggleDetails(pairToken) {
            const el = document.getElementById(`details-${pairToken}`);
            el.classList.toggle('open');
            // Refresh content in case scanner updated
            const s = scanners.get(pairToken);
            if (s) el.innerHTML = detailsHTML(s);
        }

        function toggleNotify(pairToken) {
            const el = document.getElementById(`notify-${pairToken}`);
            el.classList.toggle('open');
            if (el.classList.contains('open')) {
                el.querySelector('input').focus();
            }
        }

        async function sendNotify(pairToken) {
            const titleEl = document.getElementById(`ntitle-${pairToken}`);
            const msgEl   = document.getElementById(`nmsg-${pairToken}`);
            if (!titleEl || !msgEl) return;
            const title   = titleEl.value.trim();
            const message = msgEl.value.trim();
            if (!message) return;
            const r = await fetch('/api/monitor/notify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pairToken, title: title || 'Admin Message', message }),
            });
            const data = r.ok ? await r.json() : null;
            const notifForm = document.getElementById(`notify-${pairToken}`);
            if (data && data.delivered > 0) {
                if (notifForm) notifForm.classList.remove('open');
                if (msgEl) msgEl.value = '';
                const sentCard = document.getElementById(`card-${pairToken}`);
                if (sentCard) { sentCard.style.outline = '3px solid #6366f1'; setTimeout(() => sentCard.style.outline = '', 1200); }
            } else {
                // Scanner is in the registry but its SSE channel is not active
                const errEl = notifForm?.querySelector('.notify-err');
                if (errEl) { errEl.textContent = 'Scanner offline — notification not delivered.'; errEl.style.display = 'block'; setTimeout(() => errEl.style.display = 'none', 4000); }
            }
        }

        // ── Notify All ────────────────────────────────────────────────────
        function openNotifyAll() { document.getElementById('notifyAllModal').classList.add('open'); setTimeout(() => document.getElementById('notifyAllMsg').focus(), 80); }
        function closeNotifyAll() { document.getElementById('notifyAllModal').classList.remove('open'); }

        async function submitNotifyAll() {
            const title = document.getElementById('notifyAllTitle').value.trim();
            const message = document.getElementById('notifyAllMsg').value.trim();
            const errEl = document.getElementById('notifyAllErr');
            const btn = document.getElementById('notifyAllSubmit');
            if (!message) { errEl.textContent = 'Message is required.'; errEl.style.display = 'block'; return; }
            errEl.style.display = 'none';
            btn.disabled = true; btn.textContent = 'Sending…';
            const r = await fetch('/api/monitor/notify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pairToken: '*', title: title || 'Admin Message', message }),
            });
            const data = await r.json();
            btn.disabled = false; btn.textContent = 'Send to All';
            if (data.ok) {
                closeNotifyAll();
                document.getElementById('notifyAllMsg').value = '';
                document.getElementById('notifyAllTitle').value = '';
            } else {
                errEl.textContent = data.error || 'Failed.'; errEl.style.display = 'block';
            }
        }

        // ── Helpers ───────────────────────────────────────────────────────
        function timeAgo(iso, isOnline) {
            if (isOnline) return 'Connected';
            const sec = Math.floor((Date.now() - new Date(iso)) / 1000);
            if (sec < 15) return 'Just now';
            if (sec < 60) return `${sec}s ago`;
            if (sec < 3600) return `${Math.floor(sec / 60)}m ago`;
            return `${Math.floor(sec / 3600)}h ago`;
        }

        function esc(str) {
            return String(str ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            location.href = '/login.html';
        }

        // Refresh lastSeen labels every 5 s without full re-render if nothing changed
        setInterval(() => {
            document.querySelectorAll('.last-seen').forEach(el => {
                const card = el.closest('.scanner-card');
                if (!card) return;
                const id = card.id.replace('card-', '');
                const s = scanners.get(id);
                if (s) el.textContent = s.online ? 'Connected' : `Last seen ${timeAgo(s.lastSeen, false)}`;
            });
            // Also update status dot colours
            for (const [pt, s] of scanners) {
                const card = document.getElementById(`card-${pt}`);
                if (!card) continue;
                const newStatus = onlineStatus(s);
                card.className = card.className.replace(/status-\w+/, `status-${newStatus}`);
                const dot = card.querySelector('.scanner-status-dot');
                if (dot) dot.className = `scanner-status-dot dot-${newStatus}`;
            }
        }, 5000);

        init();
    </script>
</body>

</html>
