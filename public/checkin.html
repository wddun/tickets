<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Check-In | WTS Tickets</title>
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="stylesheet" href="kiosk.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #fff;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Nav bar ── */
        .nav-bar {
            flex-shrink: 0;
            background: rgba(0,0,0,0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: calc(env(safe-area-inset-top, 0px) + 10px) 14px 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .nav-top {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-title {
            flex: 1;
            font-size: 17px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .nav-stats {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.45);
            white-space: nowrap;
        }


        /* At-door action row (under event picker) */
        .at-door-actions {
            display: none;
            gap: 8px;
            margin-top: 8px;
        }
        .at-door-actions.show { display: flex; }
        .at-door-actions a {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-decoration: none;
            color: #fff;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 9px 12px;
            border-radius: 9px;
            font-size: 13px;
            font-weight: 600;
        }
        .at-door-actions a:active { background: rgba(255,255,255,0.2); }

        /* ── Search bar ── */
        .search-bar {
            flex-shrink: 0;
            padding: 10px 14px;
            background: rgba(0,0,0,0.6);
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .search-wrap {
            position: relative;
        }
        .search-icon {
            position: absolute;
            left: 11px; top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: rgba(255,255,255,0.38);
            display: flex;
        }
        #searchInput {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 12px;
            padding: 10px 12px 10px 36px;
            color: #fff;
            font-family: inherit;
            font-size: 15px;
        }
        #searchInput::placeholder { color: rgba(255,255,255,0.32); }
        #searchInput:focus { outline: none; background: rgba(255,255,255,0.14); }

        /* ── Attendee list ── */
        #attendeeList {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 8px;
        }

        .list-section {
            padding: 14px 16px 6px;
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.7px;
            color: rgba(255,255,255,0.3);
            display: flex; align-items: center; gap: 8px;
        }
        .list-section-count {
            font-size: 11px; font-weight: 600;
            background: rgba(255,255,255,0.1);
            padding: 1px 7px; border-radius: 10px;
            letter-spacing: 0;
        }

        .person-row {
            margin: 0 12px 2px;
            border-radius: 13px;
            overflow: hidden;
            background: rgba(255,255,255,0.07);
        }
        .person-row + .person-row { margin-top: 2px; }

        .person-main {
            display: flex;
            align-items: center;
            gap: 13px;
            padding: 11px 14px 11px 12px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            min-height: 64px;
        }

        .avatar {
            width: 42px; height: 42px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; font-weight: 700;
            flex-shrink: 0;
            letter-spacing: -0.5px;
        }
        .av-pending { background: rgba(255,255,255,0.1);  color: rgba(255,255,255,0.6); }
        .av-partial { background: rgba(251,191,36,0.18);  color: var(--warning); }
        .av-done    { background: rgba(16,185,129,0.18);  color: var(--success); }

        .person-info { flex: 1; min-width: 0; }
        .person-name {
            font-size: 16px; font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-bottom: 2px;
        }
        .person-status {
            font-size: 12px; color: rgba(255,255,255,0.4);
            display: flex; align-items: center; gap: 5px;
        }
        .status-dot {
            width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
        }
        .sd-pending { background: rgba(255,255,255,0.3); }
        .sd-partial { background: var(--warning); }
        .sd-done    { background: var(--success); }

        .row-checkin-btn {
            background: #fff;
            border: none; color: #1a1f3c;
            font-size: 13px; font-weight: 700;
            padding: 8px 16px; border-radius: 20px;
            cursor: pointer; white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
        }
        .row-checkin-btn:active { opacity: 0.65; }
        .row-done-label {
            font-size: 13px; font-weight: 600;
            color: var(--success); flex-shrink: 0;
        }
        .row-undo-btn {
            background: rgba(255,255,255,0.1);
            border: none; color: rgba(255,255,255,0.75);
            font-size: 12px; font-weight: 700;
            padding: 8px 14px; border-radius: 20px;
            cursor: pointer; white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
        }
        .row-undo-btn:active { opacity: 0.65; }
        .row-multi-hint {
            font-size: 11px; color: rgba(255,255,255,0.25);
            flex-shrink: 0; margin-left: 2px;
        }

        /* ── Ticket picker sheet ── */
        .sheet-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 200;
            display: flex; align-items: flex-end;
            opacity: 0; transition: opacity 0.22s;
            pointer-events: none;
        }
        .sheet-overlay.open { opacity: 1; pointer-events: auto; }
        .sheet {
            background: #1c1c1e;
            border-radius: 22px 22px 0 0;
            width: 100%;
            max-height: 75vh;
            display: flex; flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
        }
        .sheet-overlay.open .sheet { transform: translateY(0); }
        .sheet-handle {
            width: 36px; height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin: 12px auto 0;
            flex-shrink: 0;
        }
        .sheet-header {
            padding: 14px 20px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
        }
        .sheet-name {
            font-size: 17px; font-weight: 700; margin-bottom: 2px;
        }
        .sheet-subtitle {
            font-size: 13px; color: rgba(255,255,255,0.4);
        }
        .sheet-tickets { flex: 1; overflow-y: auto; }
        .sheet-ticket-row {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .sheet-ticket-row:last-child { border-bottom: none; }
        .sheet-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
        .sheet-dot-used    { background: var(--success); }
        .sheet-dot-pending { background: rgba(255,255,255,0.2); }
        .sheet-ticket-info { flex: 1; min-width: 0; }
        .sheet-ticket-num { font-size: 15px; font-weight: 600; }
        .sheet-ticket-status { font-size: 12px; color: rgba(255,255,255,0.38); margin-top: 1px; }
        .sheet-ticket-btn {
            background: rgba(255,255,255,0.12); border: none;
            color: #fff; font-size: 13px; font-weight: 700;
            padding: 8px 16px; border-radius: 20px;
            cursor: pointer; white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }
        .sheet-ticket-btn:active { opacity: 0.7; }
        .sheet-ticket-done { font-size: 13px; font-weight: 700; color: var(--success); }
        .sheet-footer {
            padding: 12px 16px;
            border-top: 1px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
            padding-bottom: max(12px, env(safe-area-inset-bottom, 12px));
        }
        .sheet-all-btn {
            width: 100%; padding: 14px;
            background: #fff; color: #1a1f3c;
            border: none; border-radius: 14px;
            font-size: 16px; font-weight: 700;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .sheet-all-btn:active { opacity: 0.8; }

        .list-empty {
            text-align: center;
            color: rgba(255,255,255,0.3);
            padding: 60px 20px;
            font-size: 14px;
        }

        /* ── Tab bar ── */
    </style>
</head>
<body>

<div class="nav-bar">
    <div class="nav-top">
        <div class="nav-title" id="navTitle">Check-In</div>
        <div class="nav-stats" id="navStats"></div>
    </div>
    <div class="at-door-actions" id="atDoorActions">
        <a href="#" id="btnAtDoor" target="_blank">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v4a1 1 0 0 0 1 1 2 2 0 1 1 0 4 1 1 0 0 0-1 1v4a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-4a1 1 0 0 0-1-1 2 2 0 1 1 0-4 1 1 0 0 0 1-1V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2z"/></svg>
            At Door
        </a>
        <a href="#" id="btnKiosk" target="_blank">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            Kiosk
        </a>
    </div>
</div>

<div class="search-bar">
    <div class="search-wrap">
        <span class="search-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input type="search" id="searchInput" placeholder="Search attendees…" oninput="filterList()" autocomplete="off">
    </div>
</div>

<div id="attendeeList"><div class="list-empty">Loading…</div></div>

<div class="tab-bar">
    <div class="tab-bar-inner">
        <button class="tab-btn" onclick="window.location.href='/scanner.html'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="5" height="5"/><rect x="16" y="3" width="5" height="5"/><rect x="3" y="16" width="5" height="5"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3a2 2 0 0 1-2 2H7"/><path d="M3 12h.01"/><path d="M12 3h.01"/><path d="M12 16v.01"/><path d="M16 12h1"/><path d="M21 12v.01"/><path d="M12 21v-1"/></svg>
            Scanner
        </button>
        <button class="tab-btn active" onclick="">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            Check-In
        </button>
        <button class="tab-btn" onclick="window.location.href='/scanner.html?tab=settings'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            Settings
        </button>
    </div>
    <div class="tab-bar-safe"></div>
</div>

<div class="sheet-overlay" id="ticketSheet" onclick="closeTicketSheet()">
    <div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
            <div class="sheet-name" id="sheetName"></div>
            <div class="sheet-subtitle" id="sheetSubtitle"></div>
        </div>
        <div class="sheet-tickets" id="sheetTickets"></div>
        <div class="sheet-footer">
            <button class="sheet-all-btn" id="sheetAllBtn" onclick="checkInAllFromSheet()">Check In All</button>
        </div>
    </div>
</div>

<script>
let events = [];
let allAttendees = [];
let filteredAttendees = [];
let sheetRegId = null;
let lockedEventId = null;

function currentEventFullAccess() {
    const ev = events.find(e => e.id === lockedEventId);
    return !!(ev && ev.fullAccess);
}

// ── Init ──────────────────────────────────────────────────
(async () => {
    try {
        const r = await fetch('/api/auth/me');
        if (!r.ok) { window.location.href = '/'; return; }
    } catch (_) { window.location.href = '/'; return; }

    // Manual check-in only ever operates on whatever event the Scanner tab
    // is currently locked to — there's no picker here. Switching events
    // happens exclusively from Scanner > Switch Event.
    try {
        const r = await fetch('/api/events');
        if (r.ok) events = await r.json();
    } catch (_) { /* handled below */ }

    const eventId = localStorage.getItem('selectedEventId');
    const ev = events.find(e => e.id === eventId);
    if (!ev) {
        document.getElementById('navTitle').textContent = 'Check-In';
        document.getElementById('attendeeList').innerHTML =
            '<div class="list-empty">No event selected — pick one from the Scanner tab.</div>';
        return;
    }

    lockedEventId = ev.id;
    updateAtDoorActions(ev.id);
    await loadAttendees(ev.id);
})();

function updateAtDoorActions(eventId) {
    const row = document.getElementById('atDoorActions');
    const ev = events.find(e => e.id === eventId);
    if (ev && ev.atDoorEnabled) {
        document.getElementById('btnAtDoor').href = `/at-door.html?id=${encodeURIComponent(ev.id)}`;
        document.getElementById('btnKiosk').href  = `/kiosk.html?id=${encodeURIComponent(ev.id)}`;
        row.classList.add('show');
    } else {
        row.classList.remove('show');
    }
}

// ── Data ──────────────────────────────────────────────────
async function loadAttendees(eventId) {
    document.getElementById('attendeeList').innerHTML = '<div class="list-empty">Loading…</div>';
    const ev = events.find(e => e.id === eventId);
    document.getElementById('navTitle').textContent = ev ? ev.name : 'Check-In';
    try {
        const r = await fetch(`/api/event/${eventId}/tickets`);
        if (!r.ok) throw new Error();
        const tickets = await r.json();
        const groups = {};
        for (const t of tickets) {
            const rid = t.registrationId || t.id;
            if (!groups[rid]) groups[rid] = { registrationId: rid, name: t.name, email: t.email, tickets: [] };
            groups[rid].tickets.push(t);
        }
        allAttendees = Object.values(groups).sort((a, b) => a.name.localeCompare(b.name));
    } catch (_) {
        allAttendees = [];
    }
    filterList();
}

// ── Rendering ─────────────────────────────────────────────
function filterList() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    filteredAttendees = q
        ? allAttendees.filter(a => a.name.toLowerCase().includes(q) || (a.email || '').toLowerCase().includes(q))
        : allAttendees;
    renderList();
}

function renderList() {
    const container = document.getElementById('attendeeList');

    if (!allAttendees.length) {
        container.innerHTML = '<div class="list-empty">No attendees found</div>';
        document.getElementById('navStats').textContent = '';
        return;
    }

    const totalTickets   = allAttendees.reduce((n, a) => n + a.tickets.length, 0);
    const scannedTickets = allAttendees.reduce((n, a) => n + a.tickets.filter(t => t.used_at).length, 0);
    const pct = totalTickets ? Math.round(scannedTickets / totalTickets * 100) : 0;
    document.getElementById('navStats').textContent = `${scannedTickets} / ${totalTickets} · ${pct}%`;

    if (!filteredAttendees.length) {
        container.innerHTML = '<div class="list-empty">No results</div>';
        return;
    }

    const pending = filteredAttendees.filter(a => a.tickets.every(t => !t.used_at));
    const partial = filteredAttendees.filter(a => a.tickets.some(t => t.used_at) && a.tickets.some(t => !t.used_at));
    const done    = filteredAttendees.filter(a => a.tickets.every(t => t.used_at));

    let html = '';
    const needingAction = [...pending, ...partial];

    if (needingAction.length) {
        html += `<div class="list-section">Pending<span class="list-section-count">${needingAction.length}</span></div>`;
        html += needingAction.map(buildPersonRow).join('');
    }
    if (done.length) {
        html += `<div class="list-section" style="margin-top:6px;">Checked In<span class="list-section-count">${done.length}</span></div>`;
        html += done.map(buildPersonRow).join('');
    }
    html += '<div style="height:12px;"></div>';
    container.innerHTML = html;
}

function buildPersonRow(a) {
    const total   = a.tickets.length;
    const scanned = a.tickets.filter(t => t.used_at).length;
    const allDone = scanned === total;
    const noDone  = scanned === 0;

    const initials = a.name.trim().split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
    const avClass  = allDone ? 'av-done' : noDone ? 'av-pending' : 'av-partial';
    const sdClass  = allDone ? 'sd-done' : noDone ? 'sd-pending' : 'sd-partial';

    const statusTxt = allDone
        ? (total === 1 ? 'Checked in' : `All ${total} tickets checked in`)
        : noDone
        ? (total === 1 ? '1 ticket · Pending' : `${total} tickets · None checked in`)
        : `${scanned} of ${total} checked in`;

    // Undo is only for full-access collaborators/owners/admins — a
    // view-only check-in helper can check people in but can't reverse it.
    const undoBtn = (!noDone && currentEventFullAccess())
        ? `<button class="row-undo-btn" onclick="undoPerson(event,'${escAttr(a.registrationId)}')">Undo</button>`
        : '';

    let actionHtml;
    if (allDone) {
        actionHtml = `${undoBtn}<div class="row-done-label">Done</div>`;
    } else if (total > 1) {
        actionHtml = `${undoBtn}<button class="row-checkin-btn" onclick="openTicketSheet(event,'${escAttr(a.registrationId)}')">Check In</button>`;
    } else {
        actionHtml = `${undoBtn}<button class="row-checkin-btn" onclick="checkInPerson(event,'${escAttr(a.registrationId)}')">Check In</button>`;
    }

    const multiHint = total > 1 ? `<div class="row-multi-hint">${total} tickets</div>` : '';

    return `
        <div class="person-row" id="reg-${escAttr(a.registrationId)}">
            <div class="person-main">
                <div class="avatar ${avClass}">${escHtml(initials)}</div>
                <div class="person-info">
                    <div class="person-name">${escHtml(a.name)}</div>
                    <div class="person-status">
                        <span class="status-dot ${sdClass}"></span>
                        ${escHtml(statusTxt)}
                    </div>
                </div>
                <div onclick="event.stopPropagation()" style="display:flex;align-items:center;gap:8px;flex-shrink:0">
                    ${multiHint}${actionHtml}
                </div>
            </div>
        </div>`;
}

// ── Check-in actions ──────────────────────────────────────
async function checkInPerson(e, registrationId) {
    e.stopPropagation();
    const btn = e.target;
    btn.textContent = '…'; btn.disabled = true;
    try {
        const r = await fetch(`/api/checkin/${registrationId}`, { method: 'POST' });
        if (r.ok) {
            const now = new Date().toISOString();
            const attendee = allAttendees.find(a => a.registrationId === registrationId);
            if (attendee) attendee.tickets.forEach(t => { if (!t.used_at) t.used_at = now; });
            filterList();
        } else {
            btn.textContent = 'Check In'; btn.disabled = false;
        }
    } catch (_) { btn.textContent = 'Check In'; btn.disabled = false; }
}

async function undoPerson(e, registrationId) {
    e.stopPropagation();
    const btn = e.target;
    btn.textContent = '…'; btn.disabled = true;
    try {
        const r = await fetch(`/api/checkin/${registrationId}`, { method: 'DELETE' });
        if (r.ok) {
            const attendee = allAttendees.find(a => a.registrationId === registrationId);
            if (attendee) attendee.tickets.forEach(t => { t.used_at = null; });
            filterList();
        } else {
            btn.textContent = 'Undo'; btn.disabled = false;
        }
    } catch (_) { btn.textContent = 'Undo'; btn.disabled = false; }
}

// ── Ticket picker sheet ───────────────────────────────────
function openTicketSheet(e, registrationId) {
    e.stopPropagation();
    sheetRegId = registrationId;
    renderSheet();
    document.getElementById('ticketSheet').classList.add('open');
}

function closeTicketSheet() {
    document.getElementById('ticketSheet').classList.remove('open');
    sheetRegId = null;
}

function renderSheet() {
    const a = allAttendees.find(x => x.registrationId === sheetRegId);
    if (!a) return;
    const scanned = a.tickets.filter(t => t.used_at).length;
    document.getElementById('sheetName').textContent = a.name;
    document.getElementById('sheetSubtitle').textContent = `${scanned} of ${a.tickets.length} checked in`;
    document.getElementById('sheetAllBtn').style.display = scanned === a.tickets.length ? 'none' : 'block';

    document.getElementById('sheetTickets').innerHTML = a.tickets.map((t, i) => {
        const time = t.used_at
            ? new Date(t.used_at).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })
            : null;
        return `
            <div class="sheet-ticket-row">
                <div class="sheet-dot ${t.used_at ? 'sheet-dot-used' : 'sheet-dot-pending'}"></div>
                <div class="sheet-ticket-info">
                    <div class="sheet-ticket-num">Ticket ${i + 1}</div>
                    <div class="sheet-ticket-status">${time ? `Checked in ${escHtml(time)}` : 'Pending'}</div>
                </div>
                ${t.used_at
                    ? `<div class="sheet-ticket-done">✓</div>`
                    : `<button class="sheet-ticket-btn" onclick="checkInFromSheet('${escAttr(t.id)}', this)">Check In</button>`
                }
            </div>`;
    }).join('');
}

async function checkInFromSheet(ticketId, btn) {
    const a = allAttendees.find(x => x.registrationId === sheetRegId);
    const ticket = a && a.tickets.find(t => t.id === ticketId);
    if (!ticket) return;
    btn.textContent = '…'; btn.disabled = true;
    try {
        const r = await fetch(`/api/checkin/${ticketId}`, { method: 'POST' });
        if (r.ok) {
            ticket.used_at = new Date().toISOString();
            renderSheet();
            filterList();
        } else { btn.textContent = 'Check In'; btn.disabled = false; }
    } catch (_) { btn.textContent = 'Check In'; btn.disabled = false; }
}

async function checkInAllFromSheet() {
    const a = allAttendees.find(x => x.registrationId === sheetRegId);
    if (!a) return;
    const btn = document.getElementById('sheetAllBtn');
    btn.textContent = '…'; btn.disabled = true;
    try {
        const r = await fetch(`/api/checkin/${sheetRegId}`, { method: 'POST' });
        if (r.ok) {
            const now = new Date().toISOString();
            a.tickets.forEach(t => { if (!t.used_at) t.used_at = now; });
            renderSheet();
            filterList();
        } else { btn.textContent = 'Check In All'; btn.disabled = false; }
    } catch (_) { btn.textContent = 'Check In All'; btn.disabled = false; }
}

// ── Utilities ─────────────────────────────────────────────
function escHtml(s)  { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s)  { return String(s ?? '').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
</script>

</html>
