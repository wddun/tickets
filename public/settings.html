<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Account | WTS Tickets</title>
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #fff;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Nav bar ── */
        .nav-bar {
            flex-shrink: 0;
            background: rgba(0,0,0,0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: calc(env(safe-area-inset-top, 0px) + 12px) 16px 12px;
            display: flex;
            align-items: center;
        }
        .nav-title {
            flex: 1;
            text-align: center;
            font-size: 17px;
            font-weight: 700;
        }

        /* ── Content ── */
        .content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 24px 16px 32px;
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
        }

        /* ── Tab bar ── */
        .tab-bar {
            flex-shrink: 0;
            background: rgba(10,10,10,0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .tab-bar-inner {
            display: flex;
            height: 49px;
        }
        .tab-bar-safe {
            height: env(safe-area-inset-bottom, 0px);
        }
        .tab-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            font-size: 10px;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.15s;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .tab-btn.active { color: #fff; }
        .tab-btn svg { width: 22px; height: 22px; }

        /* ── Section ── */
        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.38);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 0 4px;
            margin-bottom: 8px;
        }
        .card {
            background: rgba(255,255,255,0.06);
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 28px;
        }
        .card-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .card-row:last-child { border-bottom: none; }
        .card-row-label {
            flex: 1;
            font-size: 15px;
            color: rgba(255,255,255,0.9);
        }
        .card-row-value {
            font-size: 14px;
            color: rgba(255,255,255,0.4);
            max-width: 55%;
            text-align: right;
            word-break: break-all;
        }
        .card-row-btn {
            background: none;
            border: none;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .card-row-btn:active { opacity: 0.55; }
        .btn-red  { color: #f87171; }

        /* ── Event picker ── */
        .event-select-wrap {
            position: relative;
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .event-select-wrap::after {
            content: '▾';
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            pointer-events: none;
        }
        select.event-select {
            width: 100%;
            background: none;
            border: none;
            color: #fff;
            font-family: inherit;
            font-size: 15px;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            padding-right: 20px;
        }
        select.event-select option { background: #1c1c1e; }

        /* ── QR code area ── */
        .qr-wrap {
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }
        .qr-img-container {
            background: #fff;
            border-radius: 12px;
            padding: 12px;
            width: 180px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .qr-img-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 4px;
        }
        .qr-hint {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            text-align: center;
            max-width: 260px;
            line-height: 1.5;
        }
        .qr-placeholder {
            font-size: 13px;
            color: rgba(255,255,255,0.25);
            text-align: center;
            padding: 20px;
        }
        .qr-loading {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>

<div class="nav-bar">
    <div class="nav-title">Account</div>
</div>

<div class="content">

    <!-- Account section -->
    <div class="section-title">Account</div>
    <div class="card" id="accountCard">
        <div class="card-row">
            <div class="card-row-label">Email</div>
            <div class="card-row-value" id="emailVal">—</div>
        </div>
        <div class="card-row">
            <button class="card-row-btn btn-red" onclick="signOut()">Sign Out</button>
        </div>
    </div>

    <!-- Display connect section -->
    <div class="section-title">Display Screen</div>
    <div class="card">
        <div class="event-select-wrap">
            <select class="event-select" id="eventSelect" onchange="loadQR()">
                <option value="">Select an event…</option>
            </select>
        </div>
        <div class="qr-wrap" id="qrWrap">
            <div class="qr-img-container" id="qrImgContainer">
                <span class="qr-placeholder">Select an event above</span>
            </div>
            <div class="qr-hint">Scan this code on a display device to show real-time check-in results on that screen.</div>
        </div>
    </div>

</div>

<div class="tab-bar">
    <div class="tab-bar-inner">
        <button class="tab-btn" onclick="window.location.href='/scanner.html'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="5" height="5"/><rect x="16" y="3" width="5" height="5"/><rect x="3" y="16" width="5" height="5"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3a2 2 0 0 1-2 2H7"/><path d="M3 12h.01"/><path d="M12 3h.01"/><path d="M12 16v.01"/><path d="M16 12h1"/><path d="M21 12v.01"/><path d="M12 21v-1"/></svg>
            Scanner
        </button>
        <button class="tab-btn" onclick="window.location.href='/checkin.html'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            Check-In
        </button>
        <button class="tab-btn active" onclick="">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Account
        </button>
    </div>
    <div class="tab-bar-safe"></div>
</div>

<script>
(async () => {
    // Auth check
    let user = null;
    try {
        const r = await fetch('/api/auth/me');
        if (!r.ok) { window.location.href = '/'; return; }
        const d = await r.json();
        user = d.user;
    } catch (_) {
        window.location.href = '/';
        return;
    }

    document.getElementById('emailVal').textContent = user.email || '—';

    // Load events and restore selection from scanner page
    try {
        const r = await fetch('/api/events');
        if (r.ok) {
            const events = await r.json();
            const sel = document.getElementById('eventSelect');
            events.forEach(e => {
                const opt = document.createElement('option');
                opt.value = e.id;
                opt.textContent = e.name;
                sel.appendChild(opt);
            });
            // Auto-select: current scanner event → only event → nothing
            const saved = localStorage.getItem('selectedEventId');
            if (saved && events.find(e => e.id === saved)) {
                sel.value = saved;
            } else if (events.length === 1) {
                sel.value = events[0].id;
            }
            if (sel.value) loadQR();
        }
    } catch (_) {}
})();

async function loadQR() {
    const eventId = document.getElementById('eventSelect').value;
    const container = document.getElementById('qrImgContainer');
    if (!eventId) {
        container.innerHTML = '<span class="qr-placeholder">Select an event above</span>';
        return;
    }
    container.innerHTML = '<span class="qr-loading">Loading…</span>';
    try {
        const r = await fetch(`/api/display/qr/${encodeURIComponent(eventId)}`);
        if (!r.ok) throw new Error('Failed');
        const blob = await r.blob();
        const url = URL.createObjectURL(blob);
        container.innerHTML = `<img src="${url}" alt="Display QR code">`;
    } catch (_) {
        container.innerHTML = '<span class="qr-placeholder">Could not load QR code</span>';
    }
}

async function signOut() {
    try {
        await fetch('/api/auth/logout', { method: 'POST' });
    } catch (_) {}
    window.location.href = '/';
}
</script>
</body>
</html>
