<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | WTS Tickets</title>
    <meta name="theme-color" content="#1a1f3c">
    <link rel="stylesheet" href="style.css">
    <style>
        body { justify-content: flex-start; background: #f4f5f8; }
        .page-nav {
            background: #1a1f3c;
            padding: 0 20px; height: 52px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .page-nav img { height: 24px; width: auto; }
        .page-nav a { font-size: 13px; color: rgba(255,255,255,.6); font-weight: 500; text-decoration: none; }
        .page-nav a:hover { color: #fff; }

        .auth-wrap {
            flex: 1; display: flex;
            align-items: flex-start; justify-content: center;
            padding: 32px 16px 40px;
        }
        .auth-card {
            background: #fff;
            border: 1px solid #dde3ed;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,.07);
            padding: 32px 28px;
            width: 100%; max-width: 400px;
        }
        @media (max-width: 480px) {
            .auth-card { padding: 24px 18px; }
            .auth-wrap  { padding: 20px 12px 32px; }
        }

        .auth-icon {
            width: 52px; height: 52px;
            background: #1a1f3c; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 18px;
        }
        .auth-title { font-size: 20px; font-weight: 800; color: #1a1f3c; text-align: center; margin-bottom: 4px; }
        .auth-desc  { font-size: 14px; color: #64748b; text-align: center; margin-bottom: 24px; }

        .strength-bar {
            height: 4px; border-radius: 2px; background: #e2e8f0;
            margin-top: 6px; overflow: hidden;
        }
        .strength-fill { height: 100%; border-radius: 2px; transition: width .3s, background .3s; width: 0; }

        .success-view { text-align: center; }
        .success-view svg { display: block; margin: 0 auto 14px; }
        .success-view h2 { font-size: 20px; font-weight: 800; color: #1a1f3c; margin-bottom: 6px; }
        .success-view p  { font-size: 14px; color: #64748b; margin-bottom: 22px; }

        .error-msg {
            background: #fef2f2; border: 1px solid #fecaca;
            border-radius: 8px; padding: 10px 14px;
            color: #dc2626; font-size: 13px; margin-bottom: 16px; display: none;
        }
    </style>
</head>
<body>
    <nav class="page-nav">
        <a href="/"><img src="/logo-nav.svg" alt="Will's Tech Support"></a>
        <a href="/login.html">← Login</a>
    </nav>
    <div class="auth-wrap">
        <div class="auth-card">

            <div id="formView">
                <div class="auth-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </div>
                <div class="auth-title">Set a new password</div>
                <div class="auth-desc">Choose something strong — at least 8 characters.</div>

                <div id="errorMsg" class="error-msg"></div>

                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" oninput="updateStrength(this.value)">
                    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                </div>
                <div class="form-group">
                    <label for="confirm">Confirm Password</label>
                    <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password">
                </div>
                <button type="button" id="submitBtn" onclick="submit()">Reset Password</button>
            </div>

            <div id="successView" class="success-view" style="display:none;">
                <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg>
                <h2>Password updated!</h2>
                <p>Your password has been changed. You can now log in with your new password.</p>
                <a href="/login.html" style="display:block;background:#1a1f3c;color:#fff;text-decoration:none;padding:14px;border-radius:10px;font-weight:700;font-size:15px;text-align:center;">Go to Login</a>
            </div>

        </div>
    </div>

    <script>
        const token = new URLSearchParams(window.location.search).get('token');
        if (!token) {
            document.getElementById('errorMsg').textContent = 'No reset token found. Please use the link from your email.';
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('submitBtn').disabled = true;
        }

        function updateStrength(val) {
            const fill = document.getElementById('strengthFill');
            let score = 0;
            if (val.length >= 8)  score++;
            if (val.length >= 12) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;
            const pct = (score / 5) * 100;
            const color = score <= 1 ? '#ef4444' : score <= 2 ? '#f59e0b' : score <= 3 ? '#3b82f6' : '#10b981';
            fill.style.width = pct + '%';
            fill.style.background = color;
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        async function submit() {
            const password = document.getElementById('password').value;
            const confirm  = document.getElementById('confirm').value;
            document.getElementById('errorMsg').style.display = 'none';

            if (!password || password.length < 8) return showError('Password must be at least 8 characters.');
            if (password !== confirm) return showError('Passwords do not match.');

            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.textContent = 'Resetting…';
            try {
                const res  = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    document.getElementById('formView').style.display   = 'none';
                    document.getElementById('successView').style.display = 'block';
                } else {
                    showError(data.error || 'Reset failed. The link may have expired.');
                }
            } catch { showError('Connection error. Please try again.'); }
            finally  { btn.disabled = false; btn.textContent = 'Reset Password'; }
        }

        document.getElementById('confirm')?.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    </script>
</body>
</html>
