<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | WTS Tickets</title>
    <meta name="theme-color" content="#1a1f3c">
    <link rel="stylesheet" href="style.css">
    <style>
        body { justify-content: flex-start; background: #f4f5f8; }
        .page-nav {
            background: #1a1f3c; padding: 0 20px; height: 52px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .page-nav img { height: 24px; }
        .page-nav a { font-size: 13px; color: rgba(255,255,255,.6); font-weight: 500; text-decoration: none; }
        .page-nav a:hover { color: #fff; }
        .auth-wrap {
            flex: 1; display: flex; align-items: flex-start;
            justify-content: center; padding: 32px 16px 40px;
        }
        .auth-card {
            background: #fff; border: 1px solid #dde3ed; border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,.07); padding: 32px 28px;
            width: 100%; max-width: 400px;
        }
        @media (max-width:480px) { .auth-card { padding: 24px 18px; } }
        .auth-logo { text-align: center; margin-bottom: 24px; }
        .auth-logo img { height: 32px; }
        .auth-title { font-size: 20px; font-weight: 800; color: #1a1f3c; margin-bottom: 6px; }
        .auth-desc  { font-size: 14px; color: #64748b; line-height: 1.6; margin-bottom: 24px; }
        .sent-icon  { font-size: 44px; text-align: center; margin-bottom: 16px; }
        .footer-note { margin-top: 20px; font-size: 11px; color: #94a3b8; text-align: center; }
        .footer-note a { color: #94a3b8; }
    </style>
</head>
<body>
    <nav class="page-nav">
        <a href="/"><img src="/logo-nav.svg" alt="Will's Tech Support"></a>
        <a href="/login.html">← Back to Login</a>
    </nav>
    <div class="auth-wrap">
        <div class="auth-card">
            <div class="auth-logo"><img src="/logo-nav-dark.svg" alt="Will's Tech Support"></div>

            <div id="formState">
                <div class="auth-title">Forgot your password?</div>
                <div class="auth-desc">Enter your email and we'll send you a link to reset it.</div>
                <form id="forgotForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="organizer@example.com" required autocomplete="email">
                    </div>
                    <button type="submit" id="submitBtn">Send Reset Link</button>
                </form>
            </div>

            <div id="sentState" style="display:none; text-align:center;">
                <div class="sent-icon">📬</div>
                <div class="auth-title">Check your email</div>
                <div class="auth-desc">
                    If an account exists for that address, we've sent a password reset link. It expires in 1 hour.
                </div>
                <a href="/login.html" style="display:block;margin-top:4px;color:#c4294a;font-weight:600;font-size:14px;text-decoration:none;">← Back to Login</a>
            </div>

            <div class="footer-note">
                © Will's Tech Support &nbsp;·&nbsp;
                <a href="mailto:support@willstechsupport.com">support@willstechsupport.com</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').onsubmit = async e => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Sending…';
            try {
                await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('email').value })
                });
            } catch {}
            // Always show sent — don't leak whether the account exists
            document.getElementById('formState').style.display = 'none';
            document.getElementById('sentState').style.display = 'block';
        };
    </script>
</body>
</html>
