<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | WTS Tickets</title>
    <meta name="theme-color" content="#1a1f3c">
    <link rel="stylesheet" href="style.css">
    <style>
        body { justify-content: flex-start; background: #f4f5f8; }
        .page-nav {
            background: #1a1f3c;
            padding: 0 20px; height: 52px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .page-nav img { height: 24px; width: auto; }
        .page-nav a { font-size: 13px; color: rgba(255,255,255,.6); font-weight: 500; text-decoration: none; }
        .page-nav a:hover { color: #fff; }

        .auth-wrap {
            flex: 1; display: flex;
            align-items: flex-start; justify-content: center;
            padding: 32px 16px 40px;
        }
        .auth-card {
            background: #fff;
            border: 1px solid #dde3ed;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,.07);
            padding: 32px 28px;
            width: 100%; max-width: 400px;
        }
        @media (max-width: 480px) {
            .auth-card { padding: 24px 18px; }
            .auth-wrap  { padding: 20px 12px 32px; }
        }

        .auth-icon {
            width: 52px; height: 52px;
            background: #1a1f3c; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 18px;
        }
        .auth-title { font-size: 20px; font-weight: 800; color: #1a1f3c; text-align: center; margin-bottom: 4px; }
        .auth-desc  { font-size: 14px; color: #64748b; text-align: center; margin-bottom: 24px; }

        .success-view { text-align: center; }
        .success-view svg { display: block; margin: 0 auto 14px; }
        .success-view h2 { font-size: 20px; font-weight: 800; color: #1a1f3c; margin-bottom: 6px; }
        .success-view p  { font-size: 14px; color: #64748b; margin-bottom: 22px; }

        .back-link { display: block; text-align: center; margin-top: 16px; font-size: 13px; color: #94a3b8; }
        .back-link:hover { color: #64748b; }
    </style>
</head>
<body>
    <nav class="page-nav">
        <a href="/"><img src="/logo-nav.svg" alt="Will's Tech Support"></a>
        <a href="/login.html">← Login</a>
    </nav>
    <div class="auth-wrap">
        <div class="auth-card">

            <div id="formView">
                <div class="auth-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"/></svg>
                </div>
                <div class="auth-title">Forgot your password?</div>
                <div class="auth-desc">Enter your email and we'll send a reset link if an account exists.</div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="organizer@example.com" required autocomplete="email">
                </div>
                <button type="button" id="submitBtn" onclick="submit()">Send Reset Link</button>
                <a href="/login.html" class="back-link">Back to login</a>
            </div>

            <div id="successView" class="success-view" style="display:none;">
                <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#1a1f3c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                <h2>Check your inbox</h2>
                <p>If an account exists for that email, a reset link has been sent. Check your spam folder if it doesn't arrive in a few minutes.</p>
                <a href="/login.html" style="display:block;background:#1a1f3c;color:#fff;text-decoration:none;padding:14px;border-radius:10px;font-weight:700;font-size:15px;text-align:center;">Back to Login</a>
            </div>

        </div>
    </div>

    <script>
        async function submit() {
            const email = document.getElementById('email').value.trim();
            if (!email) return;
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.textContent = 'Sending…';
            try {
                await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                // Always show success to avoid account enumeration
                document.getElementById('formView').style.display    = 'none';
                document.getElementById('successView').style.display = 'block';
            } catch {
                btn.disabled = false; btn.textContent = 'Send Reset Link';
                alert('Connection error. Please try again.');
            }
        }

        document.getElementById('email')?.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    </script>
</body>
</html>
